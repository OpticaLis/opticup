<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Optic Up — Platform Admin</title>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Shared CSS -->
  <link rel="stylesheet" href="shared/css/variables.css">
  <link rel="stylesheet" href="shared/css/layout.css">
  <link rel="stylesheet" href="shared/css/components.css">
  <link rel="stylesheet" href="shared/css/components-extra.css">
  <link rel="stylesheet" href="shared/css/forms.css">
  <link rel="stylesheet" href="shared/css/modal.css">
  <link rel="stylesheet" href="shared/css/table.css">
  <link rel="stylesheet" href="shared/css/toast.css">

  <style>
    /* --- Login Screen --- */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--color-gray-50);
    }
    .admin-login-card {
      background: var(--color-white);
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
    }
    .admin-logo { text-align: center; margin-bottom: 2rem; }
    .admin-logo h1 { font-size: 1.75rem; font-weight: 700; color: var(--color-primary); margin: 0; }
    .admin-logo p { font-size: 0.875rem; color: var(--color-gray-500); margin: 0.25rem 0 0; }
    .login-form { display: flex; flex-direction: column; gap: 1rem; }
    .login-form input {
      padding: 0.75rem 1rem; border: 1px solid var(--color-gray-300); border-radius: 8px;
      font-size: 1rem; direction: ltr; text-align: left;
    }
    .login-form input:focus { outline: none; border-color: var(--color-primary); box-shadow: 0 0 0 3px var(--color-primary-light); }
    .login-error { color: var(--color-error); font-size: 0.875rem; text-align: center; min-height: 1.25rem; }

    /* --- Admin Header --- */
    .admin-header {
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 50;
      background: var(--color-white); border-bottom: 1px solid var(--color-gray-200);
      padding: 0.75rem 1.5rem;
    }
    .admin-header h2 { font-size: 1.25rem; font-weight: 700; color: var(--color-primary); margin: 0; }
    .admin-header-left { display: flex; align-items: center; gap: 0.75rem; }
    #admin-name { font-size: 0.875rem; color: var(--color-gray-700); }
    #admin-role {
      font-size: 0.75rem; padding: 0.2rem 0.6rem; border-radius: 9999px;
      background: var(--color-primary-light); color: var(--color-primary); font-weight: 600;
    }
    /* hidden span — keeps admin-app.js showAdminPanel() working */
    #welcome-name { display: none; }

    /* --- Nav Tabs --- */
    .admin-tabs {
      display: flex; gap: 0; border-bottom: 1px solid var(--color-gray-200);
      background: var(--color-white); padding: 0 1.5rem;
    }
    .admin-tab {
      padding: 0.75rem 1.25rem; font-size: 0.9375rem; font-weight: 500;
      color: var(--color-gray-500); background: none; border: none;
      border-bottom: 2px solid transparent; cursor: pointer; transition: all 0.15s;
    }
    .admin-tab:hover:not(:disabled) { color: var(--color-gray-700); }
    .admin-tab.active { color: var(--color-primary); border-bottom-color: var(--color-primary); font-weight: 600; }
    .admin-tab:disabled { opacity: 0.45; cursor: not-allowed; }

    /* --- Toolbar --- */
    .admin-toolbar {
      display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap;
      padding: 1rem 1.5rem; background: var(--color-white);
    }
    .admin-toolbar .search-input {
      flex: 1; min-width: 180px; max-width: 320px;
      padding: 0.5rem 0.75rem; border: 1px solid var(--color-gray-300); border-radius: 8px;
      font-size: 0.875rem;
    }
    .admin-toolbar .search-input:focus { outline: none; border-color: var(--color-primary); box-shadow: 0 0 0 3px var(--color-primary-light); }
    .admin-toolbar select {
      padding: 0.5rem 0.75rem; border: 1px solid var(--color-gray-300); border-radius: 8px;
      font-size: 0.875rem; background: var(--color-white); cursor: pointer;
    }
    .admin-toolbar .spacer { flex: 1; }

    /* --- Content Areas --- */
    .admin-content-area { padding: 0 1.5rem 2rem; }
    .content-placeholder {
      text-align: center; padding: 4rem 1rem; color: var(--color-gray-400); font-size: 1rem;
    }

    /* --- Slide-in Panel --- */
    #tenant-detail-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0, 0, 0, 0.3); z-index: 200;
    }
    #tenant-detail-panel {
      display: none; position: fixed; top: 0; right: auto; left: 0;
      height: 100vh; width: 480px; background: var(--color-white);
      z-index: 201; transform: translateX(-100%); transition: transform 0.3s ease;
      overflow-y: auto; box-shadow: 4px 0 24px rgba(0, 0, 0, 0.12);
      direction: rtl;
    }
    #tenant-detail-panel.open { transform: translateX(0); }
    .panel-close {
      position: absolute; top: 0.75rem; left: 0.75rem; background: none; border: none;
      font-size: 1.5rem; cursor: pointer; color: var(--color-gray-400); line-height: 1;
      padding: 0.25rem;
    }
    .panel-close:hover { color: var(--color-gray-700); }
    .panel-header { padding: 1.25rem 1.5rem 0.75rem; }
    .panel-header h3 { font-size: 1.25rem; font-weight: 700; color: var(--color-gray-900); margin: 0 0 0.25rem; }
    .panel-meta { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.5rem; }
    .panel-meta .slug { font-family: monospace; font-size: 0.8125rem; color: var(--color-gray-500); }
    .panel-url { font-size: 0.8125rem; }
    .panel-url a { color: var(--color-primary); text-decoration: none; }
    .panel-url a:hover { text-decoration: underline; }
    .panel-tabs {
      display: flex; gap: 0; border-bottom: 1px solid var(--color-gray-200);
      padding: 0 1.5rem; overflow-x: auto;
    }
    .panel-tab {
      padding: 0.5rem 0.75rem; font-size: 0.8125rem; font-weight: 500;
      color: var(--color-gray-500); background: none; border: none;
      border-bottom: 2px solid transparent; cursor: pointer; white-space: nowrap;
    }
    .panel-tab.active { color: var(--color-primary); border-bottom-color: var(--color-primary); font-weight: 600; }
    .panel-content { padding: 1rem 1.5rem; }
    .panel-actions { padding: 0.75rem 1.5rem; border-top: 1px solid var(--color-gray-200); }
    /* --- Tenant name link --- */
    .tenant-name-link { color: var(--color-primary); cursor: pointer; font-weight: 500; }
    .tenant-name-link:hover { text-decoration: underline; }
    @media (max-width: 768px) {
      #tenant-detail-panel { width: 100%; }
    }
  </style>
</head>
<body>
  <!-- Login Screen -->
  <div id="login-screen">
    <div class="admin-login-card">
      <div class="admin-logo">
        <h1>Optic Up</h1>
        <p>Platform Admin</p>
      </div>
      <div class="login-form">
        <input type="email" id="admin-email" placeholder="אימייל" autocomplete="email">
        <input type="password" id="admin-password" placeholder="סיסמה" autocomplete="current-password">
        <button id="admin-login-btn" class="btn btn-primary btn-lg" style="width:100%;">כניסה</button>
        <div id="login-error" class="login-error"></div>
      </div>
    </div>
  </div>

  <!-- Admin Panel (hidden until login) -->
  <div id="admin-panel" style="display:none;">
    <!-- Header -->
    <header class="admin-header">
      <div class="admin-header-right">
        <h2>Optic Up Admin</h2>
      </div>
      <div class="admin-header-left">
        <span id="admin-name"></span>
        <span id="admin-role"></span>
        <button id="admin-logout-btn" class="btn btn-ghost">התנתק</button>
      </div>
    </header>
    <!-- Hidden span for admin-app.js compatibility -->
    <span id="welcome-name"></span>

    <!-- Nav Tabs -->
    <nav class="admin-tabs">
      <button class="admin-tab active" data-tab="tenants" id="tab-tenants">חנויות</button>
      <button class="admin-tab" data-tab="audit" id="tab-audit">Audit Log</button>
      <button class="admin-tab" data-tab="settings" id="tab-settings" disabled title="בפאזה הבאה">הגדרות</button>
    </nav>

    <!-- Content: Tenants -->
    <div id="content-tenants">
      <div class="admin-toolbar">
        <button id="btn-new-tenant" class="btn btn-primary">➕ חנות חדשה</button>
        <div class="spacer"></div>
        <input type="text" id="search-tenants" class="search-input" placeholder="חיפוש לפי שם או קוד...">
        <select id="filter-status">
          <option value="">סטטוס: הכל</option>
          <option value="active">פעיל</option>
          <option value="trial">trial</option>
          <option value="suspended">מושהה</option>
        </select>
        <select id="filter-plan">
          <option value="">תוכנית: הכל</option>
        </select>
      </div>
      <div class="admin-content-area">
        <div id="tenants-table-container"></div>
      </div>
    </div>

    <!-- Content: Platform Audit Log -->
    <div id="content-audit" style="display:none;">
      <div class="admin-content-area" style="padding-top:1rem;">
        <div id="audit-log-container"></div>
      </div>
    </div>

    <!-- Content: Settings (placeholder) -->
    <div id="content-settings" style="display:none;">
      <div class="content-placeholder">ניהול תוכניות — בפאזה הבאה</div>
    </div>
  </div>

  <!-- Slide-in Panel: Tenant Detail -->
  <div id="tenant-detail-overlay"></div>
  <div id="tenant-detail-panel">
    <button class="panel-close" id="panel-close-btn">&times;</button>
    <div class="panel-header">
      <h3 id="panel-tenant-name"></h3>
      <div class="panel-meta">
        <span class="slug" id="panel-tenant-slug"></span>
        <span class="badge" id="panel-tenant-plan"></span>
        <span class="badge" id="panel-tenant-status"></span>
      </div>
      <div class="panel-url">
        <a id="panel-tenant-url" href="#" target="_blank"></a>
      </div>
    </div>
    <nav class="panel-tabs">
      <button class="panel-tab active" data-panel-tab="info">פרטים</button>
      <button class="panel-tab" data-panel-tab="activity">Activity Log</button>
      <button class="panel-tab" data-panel-tab="provisioning">Provisioning</button>
      <button class="panel-tab" data-panel-tab="audit">Audit</button>
    </nav>
    <div class="panel-content" id="panel-content"></div>
    <div class="panel-actions" id="panel-actions"></div>
  </div>

  <!-- Shared JS Components -->
  <script src="shared/js/toast.js"></script>
  <script src="shared/js/modal-builder.js"></script>
  <script src="shared/js/modal-wizard.js"></script>
  <script src="shared/js/table-builder.js"></script>

  <!-- Admin JS -->
  <script src="modules/admin-platform/admin-auth.js"></script>
  <script src="modules/admin-platform/admin-db.js"></script>
  <script src="modules/admin-platform/admin-audit.js"></script>
  <script src="modules/admin-platform/admin-provisioning.js"></script>
  <script src="modules/admin-platform/admin-dashboard.js"></script>
  <script src="modules/admin-platform/admin-app.js"></script>
</body>
</html>
