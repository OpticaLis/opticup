<!--
  Optic Up — CRM Module
  Design: Premium sidebar layout with theme switching
  Stack: Vanilla JS + Supabase (no build step)
  Layout: Sidebar nav + content area with 5 tab panels
-->
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Optic Up — CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<!-- Tailwind CSS (CDN — CRM only, not loaded on other ERP pages) -->
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<script>
tailwind.config = {
  important: true,
  darkMode: 'class',
  theme: {
    extend: {
      fontFamily: { heebo: ['Heebo', 'sans-serif'] },
      colors: {
        crm: {
          sidebar: '#1e1b4b',
          accent:  '#6366f1',
          surface: '#f8fafc',
          card:    '#ffffff',
          text:    '#1e293b',
          muted:   '#64748b'
        }
      }
    }
  }
};
</script>

<!-- Shared CSS (ERP design system) -->
<link rel="stylesheet" href="shared/css/variables.css">
<link rel="stylesheet" href="shared/css/components.css">
<link rel="stylesheet" href="shared/css/components-extra.css">
<link rel="stylesheet" href="shared/css/layout.css">
<link rel="stylesheet" href="shared/css/forms.css">
<link rel="stylesheet" href="shared/css/modal.css">
<link rel="stylesheet" href="shared/css/toast.css">
<link rel="stylesheet" href="shared/css/table.css">

<!-- CRM CSS (split into 4 files for Rule 12 compliance; B7 visual components in crm-visual.css) -->
<link rel="stylesheet" href="css/crm.css">
<link rel="stylesheet" href="css/crm-components.css">
<link rel="stylesheet" href="css/crm-screens.css">
<link rel="stylesheet" href="css/crm-visual.css">

</head>
<body class="crm-page">

<!-- ============================================================
     CRM APP SHELL — sidebar + main content
     ============================================================ -->
<div class="crm-app" id="crm-app">

  <!-- ======================== SIDEBAR ======================== -->
  <aside class="crm-sidebar">

    <!-- Sidebar Header -->
    <div class="crm-sidebar-header">
      <h1 class="crm-sidebar-logo">Optic Up</h1>
      <p class="crm-sidebar-subtitle">ניהול CRM</p>
    </div>

    <!-- Navigation -->
    <nav class="crm-sidebar-nav" id="crmNav">
      <button class="crm-nav-item active" data-tab="dashboard" onclick="showCrmTab('dashboard')">
        <svg class="crm-nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
        </svg>
        <span>דשבורד</span>
      </button>

      <button class="crm-nav-item" data-tab="incoming" onclick="showCrmTab('incoming')">
        <svg class="crm-nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/>
        </svg>
        <span>לידים נכנסים</span>
      </button>

      <button class="crm-nav-item" data-tab="leads" onclick="showCrmTab('leads')">
        <svg class="crm-nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        <span>רשומים</span>
      </button>

      <button class="crm-nav-item" data-tab="events" onclick="showCrmTab('events')">
        <svg class="crm-nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
        </svg>
        <span>אירועים</span>
      </button>

      <button class="crm-nav-item" data-tab="messaging" onclick="showCrmTab('messaging')">
        <svg class="crm-nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
        </svg>
        <span>מרכז הודעות</span>
      </button>

      <button class="crm-nav-item" data-tab="event-day" onclick="showCrmTab('event-day')">
        <svg class="crm-nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <span>יום אירוע</span>
      </button>

      <button class="crm-nav-item" data-tab="automation-history" onclick="showCrmTab('automation-history')">
        <svg class="crm-nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/>
        </svg>
        <span>היסטוריית אוטומציה</span>
      </button>

      <button class="crm-nav-item" data-tab="queue-live" onclick="showCrmTab('queue-live')">
        <svg class="crm-nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M20 12H4m0 0l6-6m-6 6l6 6"/>
        </svg>
        <span>תור הודעות</span>
      </button>

      <button class="crm-nav-item" data-tab="activity-log" onclick="showCrmTab('activity-log')">
        <svg class="crm-nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
        </svg>
        <span>לוג פעילות</span>
      </button>
    </nav>

    <!-- Sidebar Footer -->
    <div class="crm-sidebar-footer">
      <!-- Role indicator (click to toggle admin/team — handler in crm-bootstrap.js) -->
      <div class="crm-sidebar-role" id="crm-role-display" onclick="toggleCrmRole()" role="button" tabindex="0">
        <span class="crm-sidebar-role-label">תפקיד</span>
        <span class="crm-sidebar-role-value" id="crm-role-text">מנהל ראשי</span>
      </div>

      <!-- Theme switcher (ready for future palettes) -->
      <div class="crm-theme-switcher" id="crm-theme-switcher">
        <div class="crm-theme-dot active" data-theme="indigo" style="background:#4f46e5" title="Indigo"></div>
        <!-- Future: uncomment when palettes are defined
        <div class="crm-theme-dot" data-theme="teal" style="background:#0d9488" title="Teal"></div>
        <div class="crm-theme-dot" data-theme="ocean" style="background:#2563eb" title="Ocean"></div>
        -->
      </div>

      <!-- Settings -->
      <button class="crm-settings-link">
        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        <span>הגדרות</span>
      </button>
    </div>
  </aside>

  <!-- ======================== MAIN AREA ======================== -->
  <div class="crm-main">

    <!-- Page Header (dynamic — updated by each tab) -->
    <header class="crm-page-header" id="crm-page-header">
      <div>
        <h2 class="crm-page-title" id="crm-page-title">דשבורד</h2>
        <p class="crm-page-subtitle" id="crm-page-subtitle">סקירה כללית של ביצועי הקמפיינים</p>
      </div>
      <div id="crm-header-actions">
        <!-- Tab-specific action buttons injected here by JS -->
      </div>
    </header>

    <!-- Scrollable Content -->
    <div class="crm-content" id="crm-main">

      <!-- ========== TAB 1: DASHBOARD ========== -->
      <section id="tab-dashboard" class="crm-tab active">
        <div id="crm-dashboard-stats" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-5">
          <div class="bg-gray-100 rounded-xl min-h-[120px] animate-pulse"></div>
          <div class="bg-gray-100 rounded-xl min-h-[120px] animate-pulse"></div>
          <div class="bg-gray-100 rounded-xl min-h-[120px] animate-pulse"></div>
          <div class="bg-gray-100 rounded-xl min-h-[120px] animate-pulse"></div>
        </div>
        <div id="crm-dashboard-alerts" class="mb-5"></div>
        <div class="bg-white border border-gray-200 rounded-xl p-5 shadow-sm mb-5">
          <h3 class="text-base font-bold text-gray-900 mb-3 pb-2 border-b-2 border-gray-100">ביצועי אירועים</h3>
          <div id="crm-dashboard-events"></div>
        </div>
        <div class="bg-white border border-gray-200 rounded-xl p-5 shadow-sm mb-5">
          <h3 class="text-base font-bold text-gray-900 mb-3 pb-2 border-b-2 border-gray-100">שיעורי המרה</h3>
          <div id="crm-dashboard-status"></div>
        </div>
        <div class="bg-white border border-gray-200 rounded-xl p-5 shadow-sm mb-5">
          <h3 class="text-base font-bold text-gray-900 mb-3 pb-2 border-b-2 border-gray-100">פעילות אחרונה</h3>
          <div id="crm-dashboard-activity" class="flex flex-col"></div>
        </div>
        <div class="bg-white border border-gray-200 rounded-xl p-5 shadow-sm mb-5">
          <h3 class="text-base font-bold text-gray-900 mb-3 pb-2 border-b-2 border-gray-100">ציר אירועים</h3>
          <div id="crm-dashboard-timeline" class="py-1 px-0.5"></div>
        </div>
      </section>

      <!-- ========== TAB 2: INCOMING LEADS ========== -->
      <section id="tab-incoming" class="crm-tab">
        <div class="bg-white border border-gray-200 rounded-xl p-6 shadow-sm">
          <div class="flex items-center justify-between mb-4">
            <h3 class="text-lg font-semibold text-gray-900">לידים נכנסים</h3>
            <span class="text-sm text-gray-500" id="crm-incoming-count"></span>
          </div>
          <div class="flex flex-wrap items-center gap-2 mb-2">
            <input type="search" id="crm-incoming-search" class="flex-1 min-w-[220px] px-3 py-2 border border-gray-300 rounded-lg text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" placeholder="חיפוש לפי שם / טלפון / אימייל...">
            <button type="button" id="crm-add-lead-btn" class="ms-auto px-3 py-2 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-lg text-sm transition shadow-sm">+ הוסף ליד</button>
          </div>
          <div id="crm-incoming-advanced-filters"></div>
          <div id="crm-incoming-filter-chips" class="mb-2"></div>
          <div id="crm-incoming-table-wrap"></div>
        </div>
      </section>

      <!-- ========== TAB 3: REGISTERED LEADS ========== -->
      <section id="tab-leads" class="crm-tab">
        <div class="bg-white border border-gray-200 rounded-xl p-6 shadow-sm">
          <div class="flex items-center justify-between mb-4">
            <div class="inline-flex gap-1 bg-gray-100 p-1 rounded-lg" id="crm-leads-view-toggle">
              <button type="button" class="px-3 py-1.5 rounded-md text-sm font-medium bg-indigo-600 text-white" data-view="table" onclick="switchCrmLeadsView('table')">טבלה</button>
              <button type="button" class="px-3 py-1.5 rounded-md text-sm font-medium text-gray-500 hover:text-indigo-600" data-view="kanban" onclick="switchCrmLeadsView('kanban')">קנבן</button>
              <button type="button" class="px-3 py-1.5 rounded-md text-sm font-medium text-gray-500 hover:text-indigo-600" data-view="cards" onclick="switchCrmLeadsView('cards')">כרטיסים</button>
            </div>
            <span class="text-sm text-gray-500" id="crm-leads-count"></span>
          </div>
          <div class="flex flex-wrap items-center gap-2 mb-2">
            <input type="search" id="crm-leads-search" class="flex-1 min-w-[220px] px-3 py-2 border border-gray-300 rounded-lg text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" placeholder="חיפוש לפי שם / טלפון / אימייל...">
            <select id="crm-leads-sort" class="px-3 py-2 border border-gray-300 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50">
              <option value="full_name">מיון: שם</option>
              <option value="phone">מיון: טלפון</option>
              <option value="created_at">מיון: תאריך יצירה (חדש)</option>
              <option value="status">מיון: סטטוס</option>
            </select>
          </div>
          <div id="crm-leads-advanced-filters"></div>
          <div id="crm-leads-filter-chips" class="mb-2"></div>
          <div id="crm-leads-bulk-bar"></div>
          <div id="leads-view-table" class="crm-leads-view active">
            <div id="crm-leads-table-wrap"></div>
            <div id="crm-leads-pagination" class="flex gap-1.5 justify-center items-center mt-4 flex-wrap"></div>
          </div>
          <div id="leads-view-kanban" class="crm-leads-view"></div>
          <div id="leads-view-cards" class="crm-leads-view"></div>
        </div>
      </section>

      <!-- ========== TAB 4: EVENTS ========== -->
      <section id="tab-events" class="crm-tab">
        <div class="bg-white border border-gray-200 rounded-xl p-6 shadow-sm">
          <div class="flex flex-wrap items-center gap-2 mb-4">
            <select id="crm-events-filter-status" class="px-3 py-2 border border-gray-300 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50"><option value="">כל הסטטוסים</option></select>
            <button type="button" id="crm-events-create-btn" class="ms-auto px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-lg text-sm transition shadow-sm">יצירת אירוע +</button>
          </div>
          <div id="crm-events-table-wrap"></div>
        </div>
      </section>

      <!-- ========== TAB 5: MESSAGING HUB ========== -->
      <section id="tab-messaging" class="crm-tab">
        <div id="crm-messaging-body" class="grid grid-cols-1 md:grid-cols-[300px_1fr] gap-4 items-start">
          <aside id="template-list" class="bg-white border border-gray-200 rounded-xl p-3 shadow-sm max-h-[calc(100vh-200px)] overflow-y-auto"></aside>
          <main id="messaging-editor" class="bg-white border border-gray-200 rounded-xl p-4 shadow-sm min-h-[400px]"></main>
        </div>
      </section>

      <!-- ========== TAB 6: EVENT DAY ========== -->
      <section id="tab-event-day" class="crm-tab">
        <div id="crm-eventday-stats" class="flex gap-3 mb-4 flex-wrap"></div>
        <div id="crm-eventday-body">
          <div class="grid grid-cols-1 lg:grid-cols-[1fr_1.2fr_1fr] gap-3 items-stretch min-h-[480px]">
            <div id="eventday-col-waiting" class="bg-amber-50 border border-amber-200 rounded-xl p-3 flex flex-col overflow-y-auto max-h-[70vh]"></div>
            <div id="eventday-col-checkin" class="bg-white border border-gray-200 rounded-xl p-3 flex flex-col overflow-y-auto max-h-[70vh]">
              <input type="text" id="crm-eventday-barcode-input" class="w-full px-4 py-3 text-lg font-semibold border-2 border-gray-300 rounded-lg text-center focus:outline-none focus:border-emerald-500 focus:bg-emerald-50 focus:ring-2 focus:ring-emerald-200 mb-3 transition-all" placeholder="העבר ברקוד..." autocomplete="off" autofocus>
            </div>
            <div id="eventday-col-arrived" class="bg-emerald-50 border border-emerald-200 rounded-xl p-3 flex flex-col overflow-y-auto max-h-[70vh]"></div>
          </div>
        </div>
      </section>

      <!-- ========== TAB 7: AUTOMATION HISTORY ========== -->
      <section id="tab-automation-history" class="crm-tab">
        <div id="automation-history-host"></div>
      </section>

      <!-- ========== TAB: QUEUE LIVE ========== -->
      <section id="tab-queue-live" class="crm-tab">
        <div id="queue-live-host"></div>
      </section>

      <!-- ========== TAB 8: ACTIVITY LOG ========== -->
      <section id="tab-activity-log" class="crm-tab">
        <div id="activity-log-host"></div>
      </section>

    </div>
  </div>
</div>

<!-- ============================================================
     SCRIPTS — load order matters
     ============================================================ -->

<!-- Shared JS (ERP infrastructure) -->
<script src="shared/js/theme-loader.js"></script>
<script src="shared/js/modal-builder.js"></script>
<script src="shared/js/modal-wizard.js"></script>
<script src="shared/js/toast.js"></script>
<script src="shared/js/permission-ui.js"></script>
<script src="shared/js/supabase-client.js"></script>
<script src="shared/js/activity-logger.js"></script>

<!-- Core JS -->
<script src="js/shared-field-map.js"></script>
<script src="js/shared.js"></script>
<script src="js/shared-ui.js"></script>
<script src="js/auth-service.js"></script>
<script src="js/supabase-ops.js"></script>

<!-- CRM JS — helpers first, then init, then tab modules -->
<script src="modules/crm/crm-helpers.js"></script>
<script src="modules/crm/crm-lead-filters.js"></script>
<script src="modules/crm/crm-lead-actions.js"></script>
<script src="modules/crm/crm-lead-modals.js"></script>
<script src="modules/crm/crm-init.js"></script>
<script src="modules/crm/crm-dashboard.js"></script>
<script src="modules/crm/crm-incoming-tab.js"></script>
<script src="modules/crm/crm-leads-views.js"></script>
<script src="modules/crm/crm-leads-tab.js"></script>
<script src="modules/crm/crm-leads-detail.js"></script>
<script src="modules/crm/crm-event-actions.js"></script>
<script src="modules/crm/crm-event-register.js"></script>
<script src="modules/crm/crm-events-tab.js"></script>
<script src="modules/crm/crm-events-detail.js"></script>
<script src="modules/crm/crm-events-detail-charts.js"></script>
<script src="modules/crm/crm-event-day.js"></script>
<script src="modules/crm/crm-event-day-checkin.js"></script>
<script src="modules/crm/crm-event-day-manage.js"></script>
<script src="modules/crm/crm-event-day-schedule.js"></script>
<script src="modules/crm/crm-messaging-tab.js"></script>
<script src="modules/crm/crm-template-section.js"></script>
<script src="modules/crm/crm-messaging-templates.js"></script>
<script src="modules/crm/crm-broadcast-filters.js"></script>
<script src="modules/crm/crm-messaging-broadcast.js"></script>
<script src="modules/crm/crm-messaging-log.js"></script>
<script src="modules/crm/crm-activity-log.js"></script>
<script src="modules/crm/crm-rule-editor.js"></script>
<script src="modules/crm/crm-messaging-rules.js"></script>
<script src="modules/crm/crm-messaging-config.js"></script>
<script src="modules/crm/crm-messaging-send.js"></script>
<script src="modules/crm/crm-send-dialog.js"></script>
<script src="modules/crm/crm-event-send-message.js"></script>
<script src="modules/crm/crm-coupon-dispatch.js"></script>
<script src="modules/crm/crm-automation-engine.js"></script>
<script src="modules/crm/crm-automation-post-actions.js"></script>
<script src="modules/crm/crm-automation-runs.js"></script>
<script src="modules/crm/crm-automation-history.js"></script>
<script src="modules/crm/crm-queue-live.js"></script>
<script src="modules/crm/crm-event-edit.js"></script>
<script src="modules/crm/crm-confirm-send.js"></script>

<script src="modules/crm/crm-bootstrap.js"></script>
</body>
</html>
