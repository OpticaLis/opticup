<!--
  Optic Up — Employee Management
  Standalone page — loads employee-list.js for all logic
-->
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Optic Up — ניהול הרשאות</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<!-- Shared CSS -->
<link rel="stylesheet" href="shared/css/variables.css">
<link rel="stylesheet" href="shared/css/components.css">
<link rel="stylesheet" href="shared/css/components-extra.css">
<link rel="stylesheet" href="shared/css/layout.css">
<link rel="stylesheet" href="shared/css/forms.css">
<link rel="stylesheet" href="shared/css/modal.css">
<link rel="stylesheet" href="shared/css/toast.css">
<link rel="stylesheet" href="shared/css/table.css">
<!-- Module CSS -->
<link rel="stylesheet" href="css/header.css">
<link rel="stylesheet" href="css/employees.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>


<main>
  <div style="padding:16px">
    <div id="employees-container">טוען...</div>
  </div>
</main>

<!-- Toast container -->
<div id="toast-c" style="position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:10000;display:flex;flex-direction:column;gap:8px"></div>

<!-- Loading overlay (IDs must match shared.js showLoading/hideLoading) -->
<div id="loading" class="loading-overlay" style="display:none">
  <div class="loading-box"><div class="spinner"></div><p id="loading-text">טוען...</p></div>
</div>

<!-- Confirm dialog modal (IDs must match shared.js confirmDialog) -->
<div id="confirm-modal" class="modal-overlay" style="display:none">
  <div class="modal" style="max-width:400px;text-align:center">
    <h3 id="confirm-title">אישור</h3>
    <p id="confirm-text"></p>
    <button class="btn btn-s" id="confirm-yes">כן</button>
    <button class="btn btn-g" id="confirm-no">לא — חזור</button>
  </div>
</div>

<!-- Shared JS -->
<script src="shared/js/theme-loader.js"></script>
<script src="shared/js/modal-builder.js"></script>
<script src="shared/js/modal-wizard.js"></script>
<script src="shared/js/toast.js"></script>
<script src="shared/js/pin-modal.js"></script>
<script src="shared/js/table-builder.js"></script>
<script src="shared/js/permission-ui.js"></script>
<script src="shared/js/supabase-client.js"></script>
<script src="shared/js/activity-logger.js"></script>
<script src="shared/js/table-resize.js"></script>
<!-- Core JS -->
<script src="js/shared-field-map.js"></script>
<script src="js/shared.js"></script>
<script src="shared/js/plan-helpers.js"></script>
<script src="js/shared-ui.js"></script>
<script src="js/auth-service.js"></script>
<script src="js/supabase-ops.js"></script>
<script src="js/supabase-alerts-ocr.js"></script>
<script src="js/data-loading.js"></script>
<script src="modules/permissions/employee-list.js"></script>
<script src="js/header.js"></script>
<script src="js/alerts-badge.js"></script>
<script>
window.addEventListener('DOMContentLoaded', async () => {
  const session = await loadSession();
  if (!session) { window.location.href = '/'; return; }
  if (!hasPermission('employees.view')) { window.location.href = '/'; return; }
  await loadData();
  loadEmployeesTab();
});
</script>
</body>
</html>
