<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Optic Up — מסך בית</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/header.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Heebo', sans-serif; background: #f0f2f5; color: #1a2744; min-height: 100vh; direction: rtl; }

  /* Header */
  .home-header { background: #1a2744; color: white; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
  .home-header .brand { display: flex; align-items: center; gap: 10px; }
  .home-header .brand-icon { font-size: 1.8rem; }
  .home-header .brand-title { font-size: 1.5rem; font-weight: 700; }
  .home-header .brand-sub { font-size: .85rem; opacity: .7; margin-right: 4px; }
  .home-header .user-info { display: flex; align-items: center; gap: 12px; font-size: .9rem; }
  .home-header .user-info.hidden { display: none; }
  .home-header .logout-btn { background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.3); color: white; padding: 6px 14px; border-radius: 8px; cursor: pointer; font-family: 'Heebo', sans-serif; font-size: .85rem; transition: background .2s; }
  .home-header .logout-btn:hover { background: rgba(255,255,255,.25); }

  /* Clock */
  .clock-bar { text-align: center; padding: 14px; color: #555; font-size: .95rem; }

  /* Login button */
  .login-section { text-align: center; margin: 20px 0 10px; }
  .login-section.hidden { display: none; }
  .login-btn { background: #1a2744; color: white; border: none; padding: 14px 48px; font-size: 1.15rem; font-weight: 600; border-radius: 12px; cursor: pointer; font-family: 'Heebo', sans-serif; transition: background .2s, transform .15s; box-shadow: 0 4px 12px rgba(26,39,68,.25); }
  .login-btn:hover { background: #253a5e; transform: translateY(-1px); }

  /* Module grid */
  .modules-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; max-width: 780px; margin: 24px auto; padding: 0 20px; opacity: 0; transition: opacity 0.3s ease; }
  @media (max-width: 640px) { .modules-grid { grid-template-columns: repeat(2, 1fr); gap: 14px; } }

  .module-card { background: white; border-radius: 14px; padding: 28px 16px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,.07); transition: transform .2s, box-shadow .2s; position: relative; cursor: pointer; text-decoration: none; color: #1a2744; display: block; }
  .module-card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,.12); }
  .module-card .card-icon { font-size: 2.4rem; margin-bottom: 10px; display: block; }
  .module-card .card-label { font-size: 1.05rem; font-weight: 600; }

  /* Lock overlay — before login */
  .module-card.locked-overlay { pointer-events: none; }
  .module-card.locked-overlay::after { content: '\1F512'; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 2rem; background: rgba(255,255,255,.75); border-radius: 14px; }

  /* Coming soon */
  .module-card.coming-soon { opacity: .45; filter: blur(0.5px); pointer-events: none; }
  .module-card .badge { position: absolute; top: 10px; left: 10px; font-size: .72rem; font-weight: 600; padding: 3px 8px; border-radius: 6px; }
  .module-card .badge-soon { background: #ffc107; color: #333; }
  .module-card .badge-premium { background: #6f42c1; color: white; }

  /* PIN modal */
  #pin-modal { display: flex; position: fixed; inset: 0; z-index: 9999; background: rgba(26,39,68,.92); align-items: center; justify-content: center; }
  #pin-modal.hidden { display: none; }
  .pm-card { background: white; border-radius: 16px; padding: 40px 32px 32px; max-width: 360px; width: 90%; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,.3); }
  .pm-logo { font-size: 2.5rem; margin-bottom: 4px; color: #1a2744; }
  .pm-title { margin: 0 0 2px; color: #1a2744; font-size: 1.6rem; font-weight: 700; }
  .pm-sub { margin: 0 0 28px; color: #666; font-size: .95rem; }
  .pm-instruction { margin: 0 0 16px; color: #444; font-size: .88rem; }
  .pm-pins { display: flex; gap: 10px; justify-content: center; direction: ltr; margin-bottom: 20px; }
  .pm-pin { width: 48px; height: 56px; text-align: center; font-size: 1.5rem; border: 2px solid #d0d5dd; border-radius: 10px; outline: none; font-family: 'Heebo', sans-serif; transition: border-color .2s; }
  .pm-pin:focus { border-color: #1a2744; box-shadow: 0 0 0 3px rgba(26,39,68,.15); }
  .pm-pin:disabled { background: #f0f0f0; cursor: not-allowed; }
  #pm-error { display: none; color: #dc3545; font-size: .88rem; margin-bottom: 8px; font-weight: 600; }
  #pm-attempts { display: none; color: #888; font-size: .8rem; }

  /* Footer */
  .home-footer { text-align: center; padding: 24px; color: #999; font-size: .78rem; margin-top: 20px; }
</style>
</head>
<body>

<!-- Header -->
<div class="home-header">
  <div class="brand">
    <span class="brand-icon">&#9670;</span>
    <span class="brand-title">Optic Up</span>
    <span class="brand-sub" id="brand-sub-name"></span>
  </div>
  <div id="user-info" class="user-info hidden">
    <span id="user-display"></span>
    <button class="logout-btn" onclick="doLogout()">&#x1F6AA; יציאה</button>
  </div>
</div>

<!-- Clock -->
<div class="clock-bar" id="clock-bar"></div>

<!-- Login button -->
<div id="login-section" class="login-section">
  <button class="login-btn" onclick="openPinModal()">&#128274; התחברות</button>
</div>

<!-- Module cards -->
<div class="modules-grid" id="modules-grid"></div>

<!-- PIN Modal -->
<div id="pin-modal" class="hidden">
  <div class="pm-card">
    <div class="pm-logo">&#9670;</div>
    <h2 class="pm-title">Optic Up</h2>
    <p class="pm-sub" id="pm-sub-name"></p>
    <p class="pm-instruction">הזן קוד עובד (5 ספרות)</p>
    <div class="pm-pins">
      <input id="hpin-0" class="pm-pin" type="password" inputmode="numeric" maxlength="1" autocomplete="off">
      <input id="hpin-1" class="pm-pin" type="password" inputmode="numeric" maxlength="1" autocomplete="off">
      <input id="hpin-2" class="pm-pin" type="password" inputmode="numeric" maxlength="1" autocomplete="off">
      <input id="hpin-3" class="pm-pin" type="password" inputmode="numeric" maxlength="1" autocomplete="off">
      <input id="hpin-4" class="pm-pin" type="password" inputmode="numeric" maxlength="1" autocomplete="off">
    </div>
    <div id="pm-error"></div>
    <div id="pm-attempts"></div>
  </div>
</div>

<div class="home-footer">Optic Up &copy; 2026</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/shared.js"></script>
<script src="js/auth-service.js"></script>
<script src="js/header.js"></script>
<script src="js/alerts-badge.js"></script>
<script>
// =========================================================
// MODULES CONFIG — Single source of truth for home screen cards
// To add a module: add one object here. renderModules() does the rest.
// status: 'active' | 'coming_soon' | 'locked'
// =========================================================
const MODULES = [
  { id: 'inventory',  label: 'ניהול מלאי',   icon: '\uD83D\uDD76\uFE0F', url: 'inventory.html',           status: 'active', permission: 'inventory.view' },
  { id: 'customers',  label: 'ניהול לקוחות', icon: '\uD83D\uDC64',       url: 'customers.html',           status: 'coming_soon' },
  { id: 'finance',    label: 'פיננסים',       icon: '\uD83D\uDCB0',       url: 'finance.html',             status: 'coming_soon' },
  { id: 'lab',        label: 'מעבדה',         icon: '\uD83D\uDD2C',       url: 'lab.html',                 status: 'coming_soon' },
  { id: 'debt',       label: 'מעקב חובות ספקים', icon: '\uD83D\uDCB0',    url: 'suppliers-debt.html',      status: 'active', permission: 'debt.view' },
  { id: 'shipments', label: 'משלוחים וארגזים', icon: '\uD83D\uDE9A',     url: 'shipments.html',           status: 'active', permission: 'shipments.view' },
  { id: 'employees',  label: '\u05E0\u05D9\u05D4\u05D5\u05DC \u05D4\u05E8\u05E9\u05D0\u05D5\u05EA', icon: '\uD83D\uDD10', url: 'employees.html', status: 'active', permission: 'employees.view' },
  { id: 'settings',   label: 'הגדרות',        icon: '\u2699\uFE0F',        url: 'settings.html',            status: 'active', permission: 'settings.view' },
  { id: 'attendance', label: 'שעון נוכחות',  icon: '\uD83D\uDD50',       url: 'attendance.html',          status: 'coming_soon' }
];

let loggedIn = false;
let failCount = 0;

// =========================================================
// Render module cards
// =========================================================
function renderModules() {
  const grid = document.getElementById('modules-grid');
  grid.innerHTML = '';
  MODULES.forEach(m => {
    const a = document.createElement('a');
    a.className = 'module-card';
    a.href = m.url;

    if (m.status === 'coming_soon') {
      a.classList.add('coming-soon');
      a.removeAttribute('href');
    } else if (m.status === 'locked') {
      a.classList.add('coming-soon');
      a.removeAttribute('href');
    }

    if (!loggedIn && m.status === 'active') {
      a.classList.add('locked-overlay');
      a.removeAttribute('href');
    }

    if (loggedIn && m.status === 'active' && m.permission) {
      if (!hasPermission(m.permission)) {
        a.classList.add('locked-overlay');
        a.removeAttribute('href');
      }
    }

    let badge = '';
    if (m.status === 'coming_soon') badge = '<span class="badge badge-soon">בקרוב</span>';
    if (m.status === 'locked') badge = '<span class="badge badge-premium">\uD83D\uDC8E פרימיום</span>';

    a.innerHTML = badge + '<span class="card-icon">' + m.icon + '</span><span class="card-label">' + m.label + '</span>';

    a.onclick = function(e) {
      if (!a.href) { e.preventDefault(); return; }
    };
    grid.appendChild(a);
  });
}

// =========================================================
// Clock
// =========================================================
function updateClock() {
  const now = new Date();
  const hDate = now.toLocaleDateString('he-IL', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  const hTime = now.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  document.getElementById('clock-bar').textContent = hDate + '  \u2022  ' + hTime;
}

// =========================================================
// PIN modal
// =========================================================
function openPinModal() {
  document.getElementById('pin-modal').classList.remove('hidden');
  clearPins();
  document.getElementById('pm-error').style.display = 'none';
  document.getElementById('pm-attempts').style.display = 'none';
  setTimeout(function() { document.getElementById('hpin-0').focus(); }, 100);
}

function closePinModal() {
  document.getElementById('pin-modal').classList.add('hidden');
}

function clearPins() {
  for (let i = 0; i < 5; i++) document.getElementById('hpin-' + i).value = '';
  document.getElementById('hpin-0').focus();
}

function getPin() {
  return Array.from({ length: 5 }, function(_, i) { return document.getElementById('hpin-' + i).value; }).join('');
}

// PIN input: auto-advance, backspace, paste
document.addEventListener('DOMContentLoaded', function() {
  for (let i = 0; i < 5; i++) {
    const box = document.getElementById('hpin-' + i);
    box.addEventListener('input', function() {
      box.value = box.value.replace(/\D/g, '');
      if (box.value && i < 4) document.getElementById('hpin-' + (i + 1)).focus();
      if (i === 4 && box.value) handlePinSubmit();
    });
    box.addEventListener('keydown', function(e) {
      if (e.key === 'Backspace' && !box.value && i > 0) document.getElementById('hpin-' + (i - 1)).focus();
    });
    box.addEventListener('paste', function(e) {
      e.preventDefault();
      const text = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '').slice(0, 5);
      for (let j = 0; j < text.length && (i + j) < 5; j++) {
        document.getElementById('hpin-' + (i + j)).value = text[j];
      }
      if (text.length >= 5 - i) {
        document.getElementById('hpin-' + Math.min(4, i + text.length - 1)).focus();
        if (i + text.length >= 5) handlePinSubmit();
      }
    });
  }
});

// =========================================================
// Login submit
// =========================================================
async function handlePinSubmit() {
  if (sessionStorage.getItem('prizma_login_locked') === 'true') return;
  const pin = getPin();
  if (pin.length < 5) return;

  try {
    const { token, employee } = await verifyEmployeePIN(pin);
    await initSecureSession(employee, token);
    closePinModal();
    onLoginSuccess(employee);
  } catch (e) {
    failCount++;
    document.getElementById('pm-error').style.display = 'block';
    if (failCount >= 5) {
      sessionStorage.setItem('prizma_login_locked', 'true');
      document.getElementById('pm-error').textContent = '\u05D4\u05D7\u05E9\u05D1\u05D5\u05DF \u05E0\u05E2\u05D5\u05DC. \u05E4\u05E0\u05D4 \u05DC\u05DE\u05E0\u05D4\u05DC.';
      for (let i = 0; i < 5; i++) document.getElementById('hpin-' + i).disabled = true;
      document.getElementById('pm-attempts').style.display = 'none';
    } else {
      document.getElementById('pm-error').textContent = 'PIN \u05E9\u05D2\u05D5\u05D9';
      document.getElementById('pm-attempts').textContent = '\u05E0\u05D9\u05E1\u05D9\u05D5\u05DF ' + failCount + ' \u05DE\u05EA\u05D5\u05DA 5';
      document.getElementById('pm-attempts').style.display = 'block';
    }
    clearPins();
  }
}

// =========================================================
// Tenant name injection (from config — no hardcoded business names)
// =========================================================
function applyTenantName() {
  var name = getTenantConfig('name') || '';
  var el1 = document.getElementById('brand-sub-name');
  var el2 = document.getElementById('pm-sub-name');
  if (el1) el1.textContent = name;
  if (el2) el2.textContent = name;
  if (name) document.title = name + ' — Optic Up';
}

// =========================================================
// Post-login state
// =========================================================
function onLoginSuccess(emp) {
  loggedIn = true;
  applyTenantName();
  document.getElementById('login-section').classList.add('hidden');
  document.getElementById('user-display').textContent = emp.name + ' \u2022 \u05E1\u05E0\u05D9\u05E3 ' + (emp.branch_id || '00');
  document.getElementById('user-info').classList.remove('hidden');
  renderModules();
  document.getElementById('modules-grid').style.opacity = '1';
}

async function doLogout() {
  await clearSession();
}

// =========================================================
// Init — page load
// =========================================================
document.addEventListener('DOMContentLoaded', async function() {
  updateClock();
  setInterval(updateClock, 1000);
  renderModules();
  applyTenantName();

  // Check for existing session
  try {
    const session = await loadSession();
    if (session && session.employee) {
      onLoginSuccess(session.employee);
    } else {
      document.getElementById('modules-grid').style.opacity = '1';
    }
  } catch (e) {
    console.warn('Session restore failed:', e);
    document.getElementById('modules-grid').style.opacity = '1';
  }
});
</script>
</body>
</html>
