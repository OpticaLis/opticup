<!--
  Optic Up — Employee Management
  Standalone page — loads employee-list.js for all logic
-->
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>אופטיקה פריזמה — ניהול עובדים</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/header.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<header>
  <div class="logo"><span>&#9670;</span> אופטיקה פריזמה</div>
  <h1 style="font-size:1rem;font-weight:600;margin:0;color:white;">ניהול עובדים</h1>
  <div id="adminBtn" style="display:none;text-align:center;">
    <button class="logout-btn" onclick="confirmDialog('האם להתנתק מהמערכת?').then(ok=>{if(ok)clearSession()})">🚪 יציאה</button>
    <div id="adminBtnName" style="font-size:.75rem;opacity:.7;margin-top:2px;"></div>
  </div>
</header>

<nav id="mainNav" style="justify-content:flex-end;padding:6px 16px;">
  <a href="index.html" id="homeBtn" class="home-link" style="display:inline;color:var(--primary);text-decoration:none;font-size:.85rem;margin-left:12px;white-space:nowrap;flex-shrink:0;">&#8594; מסך בית</a>
</nav>

<main>
  <div style="padding:16px">
    <div id="employees-container">טוען...</div>
  </div>
</main>

<!-- Toast container -->
<div id="toast-c" style="position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:10000;display:flex;flex-direction:column;gap:8px"></div>

<!-- Loading overlay (IDs must match shared.js showLoading/hideLoading) -->
<div id="loading" class="loading-overlay" style="display:none">
  <div class="loading-box"><div class="spinner"></div><p id="loading-text">טוען...</p></div>
</div>

<!-- Confirm dialog modal (IDs must match shared.js confirmDialog) -->
<div id="confirm-modal" class="modal-overlay" style="display:none">
  <div class="modal" style="max-width:400px;text-align:center">
    <h3 id="confirm-title">אישור</h3>
    <p id="confirm-text"></p>
    <button class="btn btn-s" id="confirm-yes">כן</button>
    <button class="btn btn-g" id="confirm-no">לא — חזור</button>
  </div>
</div>

<script src="js/shared.js"></script>
<script src="js/auth-service.js"></script>
<script src="js/supabase-ops.js"></script>
<script src="js/data-loading.js"></script>
<script src="modules/employees/employee-list.js"></script>
<script src="js/header.js"></script>
<script src="js/alerts-badge.js"></script>
<script>
window.addEventListener('DOMContentLoaded', async () => {
  const session = await loadSession();
  if (!session) { window.location.href = 'index.html'; return; }
  if (!hasPermission('employees.view')) { window.location.href = 'index.html'; return; }
  const emp = getCurrentEmployee();
  if (emp) {
    const nameEl = document.getElementById('adminBtnName');
    if (nameEl) nameEl.textContent = emp.name;
    document.getElementById('adminBtn').style.display = '';
  }
  await loadData();
  loadEmployeesTab();
});
</script>
</body>
</html>
