<!--
  Optic Up — Shipments & Box Management
  Standalone page — loads shipments-list.js for list/filter logic
-->
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Optic Up — משלוחים וארגזים</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/header.css">
<style>
  .ship-page { max-width: 1100px; margin: 0 auto; padding: 16px; }

  /* Top bar */
  .ship-topbar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .ship-topbar .back-link { color: var(--primary); text-decoration: none; font-size: .9rem; white-space: nowrap; }
  .ship-topbar .back-link:hover { text-decoration: underline; }
  .ship-topbar h2 { margin: 0; font-size: 1.25rem; color: var(--primary); }

  /* Filter bar */
  .ship-filters { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 14px; }
  .ship-filter-select { padding: 6px 8px; border-radius: 6px; border: 1px solid var(--g300); font-family: inherit; font-size: .88rem; min-width: 120px; }
  .ship-search { padding: 6px 10px; border-radius: 6px; border: 1px solid var(--g300); font-family: inherit; font-size: .88rem; min-width: 160px; }

  /* Action buttons */
  .ship-actions { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 16px; }
  .ship-actions .spacer { flex: 1; }

  /* Box list */
  .ship-row { display: grid; grid-template-columns: 100px 80px 1fr 140px 80px 60px 120px 60px; gap: 8px; align-items: center; padding: 12px 14px; background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 8px; cursor: pointer; transition: background .15s; font-size: .88rem; }
  .ship-row:hover { background: var(--g100); }
  @media (max-width: 768px) {
    .ship-row { grid-template-columns: 80px 70px 1fr 60px 50px; font-size: .82rem; padding: 10px; }
    .ship-row .ship-col-courier, .ship-row .ship-col-packer, .ship-row .ship-col-value { display: none; }
  }
  .ship-box-num { background: #fdf0c4; color: #7a5c00; font-weight: 700; padding: 3px 8px; border-radius: 6px; text-align: center; font-size: .9rem; }
  .ship-type-badge { font-size: .82rem; font-weight: 500; }
  .ship-status { font-size: .78rem; }
  .ship-status .locked { color: var(--g500); }
  .ship-status .editable { color: #1a7f37; font-weight: 600; }
  .ship-status .correction { color: #6f42c1; }

  /* Empty state */
  .empty-state { text-align: center; padding: 48px 16px; color: var(--g400); font-size: .95rem; }

  /* Slide panel */
  .slide-panel { position: fixed; top: 0; left: 0; width: 460px; max-width: 100vw; height: 100vh; background: var(--white); box-shadow: -4px 0 24px rgba(0,0,0,.15); z-index: 900; overflow-y: auto; transform: translateX(-100%); transition: transform .3s; }
  .slide-panel.open { transform: translateX(0); }
  .slide-panel.hidden { display: none; }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 1000; display: flex; align-items: center; justify-content: center; }
  .modal.hidden { display: none; }

  /* Btn helpers */
  .btn-sm { padding: 3px 8px; border: 1px solid var(--g300); border-radius: 4px; background: var(--white); cursor: pointer; font-size: .78rem; font-family: inherit; }
  .btn-sm:hover { background: var(--g100); }

  /* Wizard */
  .wiz-box { background: var(--white); border-radius: 12px; padding: 20px 24px; max-width: 560px; width: 95vw; max-height: 90vh; overflow-y: auto; position: relative; }
  .wiz-header { text-align: center; margin-bottom: 16px; }
  .wiz-steps { display: flex; justify-content: center; gap: 6px; font-size: .9rem; color: var(--g400); }
  .wiz-dot { width: 28px; height: 28px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; border: 2px solid var(--g300); font-weight: 600; font-size: .82rem; }
  .wiz-dot.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .wiz-step-label { font-size: .82rem; color: var(--g500); margin-top: 4px; }
  .wiz-title { margin: 0 0 14px; font-size: 1.05rem; color: var(--primary); }
  .wiz-label { display: block; font-size: .85rem; font-weight: 500; margin: 10px 0 4px; color: var(--g600); }
  .wiz-input { width: 100%; padding: 8px 10px; border: 1px solid var(--g300); border-radius: 6px; font-family: inherit; font-size: .9rem; box-sizing: border-box; }
  .wiz-input:focus { border-color: var(--primary); outline: none; }
  textarea.wiz-input { resize: vertical; }
  .wiz-note { text-align: center; padding: 20px; color: var(--g400); font-size: .88rem; }
  .wiz-type-group { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .wiz-type-btn { flex: 1; min-width: 100px; padding: 12px 8px; border: 2px solid var(--g300); border-radius: 8px; background: var(--white); cursor: pointer; text-align: center; font-family: inherit; font-size: .88rem; transition: border-color .15s, background .15s; }
  .wiz-type-btn:hover { border-color: var(--primary); background: #f0f4ff; }
  .wiz-type-btn.selected { border-color: var(--primary); background: #e8eeff; font-weight: 600; }
  .wiz-type-icon { display: block; font-size: 1.3rem; margin-bottom: 4px; }
  .wiz-summary { background: var(--g100); border-radius: 8px; padding: 12px 14px; margin: 12px 0; font-size: .88rem; line-height: 1.7; }
  .wiz-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
  .wiz-create-btn { font-weight: 700; font-size: .95rem; }

  /* Wizard — Step 2 item entry */
  .wiz-item-fields { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
  .wiz-field-row { display: flex; align-items: center; gap: 8px; }
  .wiz-field-label { min-width: 100px; font-size: .82rem; color: var(--g600); text-align: left; flex-shrink: 0; }
  .wiz-field-input { flex: 1; }
  .wiz-add-btn { width: 100%; margin-bottom: 14px; }
  .wiz-items-count { font-size: .82rem; color: var(--g500); margin-bottom: 6px; font-weight: 600; }
  .wiz-items-list { display: flex; flex-direction: column; gap: 4px; }
  .wiz-item-row { display: flex; align-items: center; gap: 6px; padding: 6px 8px; background: var(--g100); border-radius: 6px; font-size: .82rem; }
  .wiz-item-num { font-weight: 700; color: var(--g500); min-width: 20px; text-align: center; }
  .wiz-item-col { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .wiz-item-col.wide { flex: 1.5; }
  .wiz-item-del { background: none; border: none; color: #c00; cursor: pointer; font-size: 1rem; padding: 2px 6px; flex-shrink: 0; }
  .wiz-item-del:hover { background: #fee; border-radius: 4px; }

  /* Staged return items picker */
  .wiz-staged-section { margin-bottom: 14px; padding: 10px; background: #f4f0ff; border: 1px solid #d5ccee; border-radius: 8px; }
  .wiz-staged-title { font-size: .88rem; font-weight: 600; color: var(--primary); margin-bottom: 8px; }
  .wiz-staged-list { display: flex; flex-direction: column; gap: 3px; max-height: 200px; overflow-y: auto; }
  .wiz-staged-row { display: flex; align-items: center; gap: 8px; padding: 6px 8px; background: var(--white); border-radius: 5px; cursor: pointer; font-size: .82rem; transition: background .12s; }
  .wiz-staged-row:hover { background: #eee8ff; }
  .wiz-staged-row.selected { background: #e0d8ff; font-weight: 500; }
  .wiz-staged-row input[type="checkbox"] { accent-color: var(--primary); flex-shrink: 0; }
  .wiz-staged-col { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .wiz-staged-ret { flex: 0.7; color: var(--g500); font-size: .78rem; }
  .wiz-manual-header { font-size: .85rem; font-weight: 600; color: var(--g600); margin-bottom: 6px; padding-top: 4px; border-top: 1px solid var(--g200); }
  .wiz-link-icon { font-size: .75rem; margin-left: 2px; flex-shrink: 0; }
  .wiz-item-linked { border-right: 3px solid #7c5cbf; }

  /* Detail panel */
  .detail-header { display: flex; align-items: center; gap: 10px; padding: 16px 18px; border-bottom: 1px solid var(--g200); position: relative; }
  .detail-close { position: absolute; top: 10px; left: 10px; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--g500); padding: 4px 8px; line-height: 1; }
  .detail-close:hover { color: var(--g700); }
  .detail-box-num { background: #fdf0c4; color: #7a5c00; font-weight: 700; padding: 6px 14px; border-radius: 8px; font-size: 1.1rem; }
  .detail-status { font-size: .85rem; }
  .detail-meta { padding: 14px 18px; border-bottom: 1px solid var(--g200); }
  .detail-meta-row { font-size: .88rem; line-height: 1.8; }
  .detail-meta-label { font-weight: 600; color: var(--g600); }
  .detail-correction-link { color: #6f42c1; font-weight: 500; }
  .detail-timer { padding: 8px 18px; font-size: .9rem; }
  .detail-items-section { padding: 14px 18px; }
  .detail-items-title { font-weight: 600; font-size: .92rem; color: var(--primary); margin-bottom: 8px; }
  .detail-items-table { font-size: .82rem; border: 1px solid var(--g200); border-radius: 6px; overflow: hidden; }
  .detail-items-header { display: grid; grid-template-columns: 30px 90px 1fr 80px 70px 1fr 30px; gap: 4px; padding: 6px 8px; background: var(--g100); font-weight: 600; color: var(--g600); font-size: .78rem; }
  .detail-item-row { display: grid; grid-template-columns: 30px 90px 1fr 80px 70px 1fr 30px; gap: 4px; padding: 6px 8px; border-top: 1px solid var(--g100); }
  .detail-item-row:hover { background: var(--g50, #fafafa); }
  .di-col { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .di-num { text-align: center; font-weight: 600; color: var(--g500); }
  .di-cost { text-align: left; }
  .di-act { text-align: center; }
  .detail-items-footer { font-size: .85rem; margin-top: 8px; color: var(--g600); font-weight: 500; }
  .detail-actions { display: flex; flex-wrap: wrap; gap: 8px; padding: 16px 18px; border-top: 1px solid var(--g200); }
  .detail-add-form { padding: 12px; background: #f0f4ff; border-radius: 8px; margin-bottom: 10px; }
  .detail-add-title { font-size: .88rem; font-weight: 600; color: var(--primary); margin-bottom: 8px; }
  .detail-edit-form { padding: 4px 0; }

  /* Print — manifest only */
  @media print {
    body > *:not(#manifest-print) { display: none !important; }
    #manifest-print { display: block !important; }
    .manifest-page { font-family: 'Heebo', sans-serif; direction: rtl; color: #000; background: #fff; padding: 20px; max-width: 100%; }
    .manifest-header { text-align: center; margin-bottom: 18px; }
    .manifest-title { font-size: 1.3rem; font-weight: 700; }
    .manifest-info { margin-bottom: 16px; line-height: 1.7; font-size: .95rem; }
    .manifest-info-row { margin-bottom: 2px; }
    .manifest-label { font-weight: 600; }
    .manifest-table { width: 100%; border-collapse: collapse; margin-bottom: 14px; font-size: .9rem; }
    .manifest-table th, .manifest-table td { border: 1px solid #333; padding: 6px 8px; text-align: right; }
    .manifest-table th { background: #eee; font-weight: 600; }
    .manifest-total { font-size: .95rem; font-weight: 600; margin-bottom: 24px; }
    .manifest-signature { margin-top: 30px; line-height: 2.5; font-size: .95rem; }
    .manifest-sig-line { display: inline-block; width: 200px; border-bottom: 1px solid #000; margin-right: 8px; }
  }
  #manifest-print { display: none; }
</style>
</head>
<body>

<main class="ship-page">
  <!-- Top bar -->
  <div class="ship-topbar">
    <a href="index.html" class="back-link">&#8594; מסך בית</a>
    <h2>&#128230; משלוחים וארגזים</h2>
  </div>

  <!-- Filters -->
  <div class="ship-filters">
    <select id="filter-type" class="ship-filter-select">
      <option value="">סוג — הכל</option>
    </select>
    <select id="filter-supplier" class="ship-filter-select">
      <option value="">ספק — הכל</option>
    </select>
    <select id="filter-courier" class="ship-filter-select">
      <option value="">שליחויות — הכל</option>
    </select>
    <select id="filter-date" class="ship-filter-select">
      <option value="">תאריך — הכל</option>
      <option value="today">היום</option>
      <option value="week">השבוע</option>
      <option value="month">החודש</option>
    </select>
    <input type="text" id="filter-search" class="ship-search" placeholder="חפש מספר ארגז...">
  </div>

  <!-- Action buttons -->
  <div class="ship-actions">
    <button class="btn btn-p" id="btn-new-box" data-permission="shipments:create">&#128230; ארגז חדש</button>
    <button class="btn btn-sm" id="btn-courier-settings" data-permission="shipments:admin" title="ניהול חברות שליחויות">&#9881;</button>
    <div class="spacer"></div>
    <button class="btn btn-g" id="btn-export-excel">&#128229; ייצוא Excel</button>
  </div>

  <!-- Box list -->
  <div id="shipments-list">
    <div class="empty-state">טוען...</div>
  </div>

  <!-- Detail panel (Phase 5.9f) -->
  <div id="shipment-detail" class="slide-panel hidden"></div>

  <!-- Wizard modal (Phase 5.9c) -->
  <div id="shipment-wizard" class="modal hidden"></div>

  <!-- Courier management modal (Phase 5.9g) -->
  <div id="courier-modal" class="modal hidden"></div>
</main>

<!-- Toast container -->
<div id="toast-c" style="position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:10000;display:flex;flex-direction:column;gap:8px"></div>

<!-- Loading overlay -->
<div id="loading" class="loading-overlay" style="display:none">
  <div class="loading-box"><div class="spinner"></div><p id="loading-text">טוען...</p></div>
</div>

<!-- Confirm dialog modal -->
<div id="confirm-modal" class="modal-overlay" style="display:none">
  <div class="modal" style="max-width:400px;text-align:center">
    <h3 id="confirm-title">אישור</h3>
    <p id="confirm-text"></p>
    <button class="btn btn-s" id="confirm-yes">כן</button>
    <button class="btn btn-g" id="confirm-no">לא — חזור</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script src="js/shared.js"></script>
<script src="js/supabase-ops.js"></script>
<script src="js/data-loading.js"></script>
<script src="js/search-select.js"></script>
<script src="js/auth-service.js"></script>
<script src="js/header.js"></script>
<script src="js/alerts-badge.js"></script>
<script src="modules/shipments/shipments-list.js"></script>
<script src="modules/shipments/shipments-create.js"></script>
<script src="modules/shipments/shipments-items.js"></script>
<script src="modules/shipments/shipments-lock.js"></script>
<script src="modules/shipments/shipments-detail.js"></script>
<script src="modules/shipments/shipments-manifest.js"></script>
<script>
window.addEventListener('DOMContentLoaded', function() {
  initShipmentsPage();
  $('btn-new-box').addEventListener('click', openNewBoxWizard);
});
</script>
</body>
</html>
