<!--
  Optic Up — Shipments & Box Management
  Standalone page — loads shipments-list.js for list/filter logic
-->
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Optic Up — משלוחים וארגזים</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/header.css">
<style>
  .ship-page { max-width: 1100px; margin: 0 auto; padding: 16px; }

  /* Top bar */
  .ship-topbar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .ship-topbar .back-link { color: var(--primary); text-decoration: none; font-size: .9rem; white-space: nowrap; }
  .ship-topbar .back-link:hover { text-decoration: underline; }
  .ship-topbar h2 { margin: 0; font-size: 1.25rem; color: var(--primary); }

  /* Filter bar */
  .ship-filters { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 14px; }
  .ship-filter-select { padding: 6px 8px; border-radius: 6px; border: 1px solid var(--g300); font-family: inherit; font-size: .88rem; min-width: 120px; }
  .ship-search { padding: 6px 10px; border-radius: 6px; border: 1px solid var(--g300); font-family: inherit; font-size: .88rem; min-width: 160px; }

  /* Action buttons */
  .ship-actions { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 16px; }
  .ship-actions .spacer { flex: 1; }

  /* Box list */
  .ship-row { display: grid; grid-template-columns: 100px 80px 1fr 140px 80px 60px 120px 60px; gap: 8px; align-items: center; padding: 12px 14px; background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 8px; cursor: pointer; transition: background .15s; font-size: .88rem; }
  .ship-row:hover { background: var(--g100); }
  @media (max-width: 768px) {
    .ship-row { grid-template-columns: 80px 70px 1fr 60px 50px; font-size: .82rem; padding: 10px; }
    .ship-row .ship-col-courier, .ship-row .ship-col-packer, .ship-row .ship-col-value { display: none; }
  }
  .ship-box-num { background: #fdf0c4; color: #7a5c00; font-weight: 700; padding: 3px 8px; border-radius: 6px; text-align: center; font-size: .9rem; }
  .ship-type-badge { font-size: .82rem; font-weight: 500; }
  .ship-status { font-size: .78rem; }
  .ship-status .locked { color: var(--g500); }
  .ship-status .editable { color: #1a7f37; font-weight: 600; }
  .ship-status .correction { color: #6f42c1; }

  /* Empty state */
  .empty-state { text-align: center; padding: 48px 16px; color: var(--g400); font-size: .95rem; }

  /* Slide panel */
  .slide-panel { position: fixed; top: 0; left: 0; width: 460px; max-width: 100vw; height: 100vh; background: var(--white); box-shadow: -4px 0 24px rgba(0,0,0,.15); z-index: 900; overflow-y: auto; transform: translateX(-100%); transition: transform .3s; }
  .slide-panel.open { transform: translateX(0); }
  .slide-panel.hidden { display: none; }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 1000; display: flex; align-items: center; justify-content: center; }
  .modal.hidden { display: none; }

  /* Btn helpers */
  .btn-sm { padding: 3px 8px; border: 1px solid var(--g300); border-radius: 4px; background: var(--white); cursor: pointer; font-size: .78rem; font-family: inherit; }
  .btn-sm:hover { background: var(--g100); }
</style>
</head>
<body>

<main class="ship-page">
  <!-- Top bar -->
  <div class="ship-topbar">
    <a href="index.html" class="back-link">&#8594; מסך בית</a>
    <h2>&#128230; משלוחים וארגזים</h2>
  </div>

  <!-- Filters -->
  <div class="ship-filters">
    <select id="filter-type" class="ship-filter-select">
      <option value="">סוג — הכל</option>
    </select>
    <select id="filter-supplier" class="ship-filter-select">
      <option value="">ספק — הכל</option>
    </select>
    <select id="filter-courier" class="ship-filter-select">
      <option value="">שליחויות — הכל</option>
    </select>
    <select id="filter-date" class="ship-filter-select">
      <option value="">תאריך — הכל</option>
      <option value="today">היום</option>
      <option value="week">השבוע</option>
      <option value="month">החודש</option>
    </select>
    <input type="text" id="filter-search" class="ship-search" placeholder="חפש מספר ארגז...">
  </div>

  <!-- Action buttons -->
  <div class="ship-actions">
    <button class="btn btn-p" id="btn-new-box" data-permission="shipments:create">&#128230; ארגז חדש</button>
    <button class="btn btn-sm" id="btn-courier-settings" data-permission="shipments:admin" title="ניהול חברות שליחויות">&#9881;</button>
    <div class="spacer"></div>
    <button class="btn btn-g" id="btn-export-excel">&#128229; ייצוא Excel</button>
  </div>

  <!-- Box list -->
  <div id="shipments-list">
    <div class="empty-state">טוען...</div>
  </div>

  <!-- Detail panel (Phase 5.9f) -->
  <div id="shipment-detail" class="slide-panel hidden"></div>

  <!-- Wizard modal (Phase 5.9c) -->
  <div id="shipment-wizard" class="modal hidden"></div>

  <!-- Courier management modal (Phase 5.9g) -->
  <div id="courier-modal" class="modal hidden"></div>
</main>

<!-- Toast container -->
<div id="toast-c" style="position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:10000;display:flex;flex-direction:column;gap:8px"></div>

<!-- Loading overlay -->
<div id="loading" class="loading-overlay" style="display:none">
  <div class="loading-box"><div class="spinner"></div><p id="loading-text">טוען...</p></div>
</div>

<!-- Confirm dialog modal -->
<div id="confirm-modal" class="modal-overlay" style="display:none">
  <div class="modal" style="max-width:400px;text-align:center">
    <h3 id="confirm-title">אישור</h3>
    <p id="confirm-text"></p>
    <button class="btn btn-s" id="confirm-yes">כן</button>
    <button class="btn btn-g" id="confirm-no">לא — חזור</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script src="js/shared.js"></script>
<script src="js/supabase-ops.js"></script>
<script src="js/data-loading.js"></script>
<script src="js/search-select.js"></script>
<script src="js/auth-service.js"></script>
<script src="js/header.js"></script>
<script src="js/alerts-badge.js"></script>
<script src="modules/shipments/shipments-list.js"></script>
<script>
window.addEventListener('DOMContentLoaded', function() { initShipmentsPage(); });
</script>
</body>
</html>
