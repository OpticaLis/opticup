<!--
  Optic Up — Storefront Blog Manager
  Create, edit, publish blog posts + AI generation
-->
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Optic Up — ניהול בלוג</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared/css/variables.css">
<link rel="stylesheet" href="shared/css/components.css">
<link rel="stylesheet" href="shared/css/components-extra.css">
<link rel="stylesheet" href="shared/css/layout.css">
<link rel="stylesheet" href="shared/css/forms.css">
<link rel="stylesheet" href="shared/css/modal.css">
<link rel="stylesheet" href="shared/css/toast.css">
<link rel="stylesheet" href="shared/css/table.css">
<link rel="stylesheet" href="css/header.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
.sf-container { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }
.sf-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
.sf-subtitle { color: var(--g400); font-size: .9rem; margin-bottom: 24px; }
.sf-nav { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
.sf-nav a { padding: 8px 16px; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: .9rem;
  background: var(--g100); color: var(--g700); transition: all .2s; }
.sf-nav a.active, .sf-nav a:hover { background: var(--primary); color: #fff; }
.sf-section { background: #fff; border: 1px solid var(--g200); border-radius: 12px; padding: 24px; margin-bottom: 20px; }

.blog-actions { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
.blog-actions button { padding: 8px 16px; border-radius: 8px; font-weight: 600; font-size: .85rem; cursor: pointer; border: none; transition: all .2s; }
.btn-new { background: var(--primary); color: #fff; }
.btn-new:hover { opacity: .9; }
.btn-ai { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; }
.btn-ai:hover { opacity: .9; }

.blog-filters { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
.blog-filters select { padding: 8px 12px; border: 1px solid var(--g300); border-radius: 8px; font-size: .9rem; font-family: inherit; }

.blog-table { width: 100%; border-collapse: collapse; font-size: .9rem; }
.blog-table th { background: var(--g50); padding: 10px 12px; text-align: right; font-weight: 600; border-bottom: 2px solid var(--g200); }
.blog-table td { padding: 10px 12px; border-bottom: 1px solid var(--g100); vertical-align: middle; }
.blog-table tr:hover { background: var(--g50); }

.status-badge { display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: .8rem; font-weight: 600; }
.status-published { background: #d1fae5; color: #059669; }
.status-draft { background: #fef3c7; color: #b45309; }
.status-archived { background: var(--g100); color: var(--g500); }

.action-btns { display: flex; gap: 6px; }
.action-btns button { padding: 4px 8px; border-radius: 4px; border: 1px solid var(--g300); background: #fff; cursor: pointer; font-size: .85rem; }
.action-btns button:hover { background: var(--g100); }

/* Edit modal */
.blog-edit-modal { max-width: 800px; width: 95vw; max-height: 90vh; overflow-y: auto; }
.edit-field { margin-bottom: 16px; }
.edit-field label { display: block; font-size: .85rem; font-weight: 600; color: var(--g600); margin-bottom: 4px; }
.edit-field input, .edit-field select { width: 100%; padding: 10px 12px; border: 1px solid var(--g300); border-radius: 8px; font-size: .95rem; font-family: inherit; }
.edit-field textarea { width: 100%; padding: 10px 12px; border: 1px solid var(--g300); border-radius: 8px; font-size: .95rem; font-family: inherit; min-height: 300px; resize: vertical; direction: rtl; }
.edit-field .char-count { font-size: .75rem; color: var(--g400); text-align: left; margin-top: 2px; }
.edit-field .char-count.warn { color: #dc2626; }
.edit-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.edit-actions { display: flex; gap: 12px; margin-top: 20px; }

/* AI topic modal */
.ai-modal { max-width: 500px; width: 90vw; }
</style>
</head>
<body>

<main>
  <div class="sf-container">
    <h1 class="sf-title">📝 ניהול בלוג</h1>
    <p class="sf-subtitle">יצירה, עריכה ופרסום פוסטים — כולל ייצור AI</p>

    <nav class="sf-nav">
      <a href="storefront-settings.html">⚙️ הגדרות</a>
      <a href="storefront-brands.html">🏷️ מותגים</a>
      <a href="storefront-products.html">📦 מוצרים</a>
      <a href="storefront-content.html">🤖 תוכן AI</a>
      <a href="storefront-blog.html" class="active">📝 בלוג</a>
    </nav>

    <div class="sf-section">
      <div class="blog-actions">
        <button class="btn-new" onclick="openNewPost()">+ פוסט חדש</button>
        <button class="btn-ai" onclick="openAIModal()">🤖 ייצר פוסט AI</button>
      </div>

      <div class="blog-filters">
        <select id="filter-status" onchange="filterBlogPosts()">
          <option value="">כל הסטטוסים</option>
          <option value="published">🟢 מפורסם</option>
          <option value="draft">🟡 טיוטה</option>
          <option value="archived">⚫ ארכיון</option>
        </select>
        <select id="filter-lang" onchange="filterBlogPosts()">
          <option value="">כל השפות</option>
          <option value="he">עברית</option>
          <option value="en">English</option>
          <option value="ru">Русский</option>
        </select>
      </div>

      <div id="blog-table-container"></div>
    </div>
  </div>
</main>

<!-- Blog edit modal -->
<div id="blog-edit-modal" class="modal-overlay" style="display:none">
  <div class="modal blog-edit-modal">
    <h3 id="blog-edit-title">עריכת פוסט</h3>

    <div class="edit-row">
      <div class="edit-field">
        <label>כותרת</label>
        <input type="text" id="blog-title">
      </div>
      <div class="edit-field">
        <label>Slug (URL)</label>
        <input type="text" id="blog-slug" dir="ltr">
      </div>
    </div>

    <div class="edit-row">
      <div class="edit-field">
        <label>שפה</label>
        <select id="blog-lang">
          <option value="he">עברית</option>
          <option value="en">English</option>
          <option value="ru">Русский</option>
        </select>
      </div>
      <div class="edit-field">
        <label>קטגוריות (מופרדות בפסיקים)</label>
        <input type="text" id="blog-categories" placeholder="אופטיקה, עדשות, טיפים">
      </div>
    </div>

    <div class="edit-field">
      <label>תוכן (HTML)</label>
      <textarea id="blog-content"></textarea>
    </div>

    <div class="edit-row">
      <div class="edit-field">
        <label>SEO Title</label>
        <input type="text" id="blog-seo-title" maxlength="80" oninput="blogCharCount('blog-seo-title', 60)">
        <div class="char-count" id="blog-seo-title-count">0/60</div>
      </div>
      <div class="edit-field">
        <label>SEO Description</label>
        <input type="text" id="blog-seo-desc" maxlength="200" oninput="blogCharCount('blog-seo-desc', 160)">
        <div class="char-count" id="blog-seo-desc-count">0/160</div>
      </div>
    </div>

    <div class="edit-row">
      <div class="edit-field">
        <label>סטטוס</label>
        <select id="blog-status">
          <option value="draft">טיוטה</option>
          <option value="published">מפורסם</option>
          <option value="archived">ארכיון</option>
        </select>
      </div>
      <div class="edit-field">
        <label>תקציר</label>
        <input type="text" id="blog-excerpt">
      </div>
    </div>

    <div class="edit-actions">
      <button class="btn-p" onclick="saveBlogPost()">💾 שמור</button>
      <button class="btn-p" onclick="publishBlogPost()" style="background:#059669">🚀 פרסם</button>
      <button class="btn-g" onclick="closeBlogEditModal()">ביטול</button>
    </div>
  </div>
</div>

<!-- AI topic modal -->
<div id="ai-topic-modal" class="modal-overlay" style="display:none">
  <div class="modal ai-modal">
    <h3>🤖 ייצור פוסט AI</h3>
    <div class="edit-field">
      <label>נושא</label>
      <input type="text" id="ai-topic" placeholder="מדריך לבחירת משקפי מולטיפוקל">
    </div>
    <div class="edit-field">
      <label>מילות מפתח (מופרדות בפסיקים)</label>
      <input type="text" id="ai-keywords" placeholder="מולטיפוקל, עדשות, בדיקת ראייה">
    </div>
    <div class="edit-field">
      <label>אורך</label>
      <select id="ai-length">
        <option value="short">קצר (~500 מילים)</option>
        <option value="medium" selected>בינוני (~1000 מילים)</option>
        <option value="long">ארוך (~2000 מילים)</option>
      </select>
    </div>
    <div class="edit-actions">
      <button class="btn-ai" onclick="generateAIBlogPost()">🤖 ייצר</button>
      <button class="btn-g" onclick="closeAIModal()">ביטול</button>
    </div>
  </div>
</div>

<!-- Toast + Loading -->
<div id="toast-c"></div>
<div id="loading" class="loading-overlay" style="display:none">
  <div class="loading-box"><div class="spinner"></div><p id="loading-text">טוען...</p></div>
</div>

<!-- Shared JS -->
<script src="shared/js/theme-loader.js"></script>
<script src="shared/js/modal-builder.js"></script>
<script src="shared/js/modal-wizard.js"></script>
<script src="shared/js/toast.js"></script>
<script src="shared/js/pin-modal.js"></script>
<script src="shared/js/table-builder.js"></script>
<script src="shared/js/permission-ui.js"></script>
<script src="shared/js/supabase-client.js"></script>
<script src="shared/js/activity-logger.js"></script>
<script src="js/shared.js"></script>
<script src="js/shared-ui.js"></script>
<script src="js/auth-service.js"></script>
<script src="js/supabase-ops.js"></script>
<script src="js/header.js"></script>
<script src="js/alerts-badge.js"></script>
<script src="modules/storefront/storefront-blog.js"></script>
<script>
window.addEventListener('DOMContentLoaded', async () => {
  const session = await loadSession();
  if (!session) { window.location.href = '/'; return; }
  if (!hasPermission('settings.view')) { window.location.href = '/'; return; }
  await loadBlogPosts();
});
</script>
</body>
</html>
