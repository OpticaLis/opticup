<!--
  Optic Up — Storefront Brand Mode Manager / ניהול מותגים — חנות אונליין
-->
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Optic Up — ניהול מותגים לחנות</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared/css/variables.css">
<link rel="stylesheet" href="shared/css/components.css">
<link rel="stylesheet" href="shared/css/components-extra.css">
<link rel="stylesheet" href="shared/css/layout.css">
<link rel="stylesheet" href="shared/css/forms.css">
<link rel="stylesheet" href="shared/css/modal.css">
<link rel="stylesheet" href="shared/css/toast.css">
<link rel="stylesheet" href="shared/css/table.css">
<link rel="stylesheet" href="css/header.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
.sf-container { max-width: 960px; margin: 0 auto; padding: 24px 16px; }
.sf-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
.sf-subtitle { color: var(--g400); font-size: .9rem; margin-bottom: 24px; }
.sf-nav { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
.sf-nav a { padding: 8px 16px; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: .9rem;
  background: var(--g100); color: var(--g700); transition: all .2s; }
.sf-nav a.active, .sf-nav a:hover { background: var(--primary); color: #fff; }
.sf-section { background: #fff; border: 1px solid var(--g200); border-radius: 12px; padding: 24px; margin-bottom: 20px; }
.brands-table { width: 100%; border-collapse: collapse; }
.brands-table th { text-align: right; padding: 10px 12px; font-weight: 600; font-size: .85rem; color: var(--g500);
  border-bottom: 2px solid var(--g200); }
.brands-table td { padding: 10px 12px; border-bottom: 1px solid var(--g100); vertical-align: middle; }
.brands-table tr:hover { background: var(--g50); }
.mode-select { padding: 6px 10px; border: 1px solid var(--g300); border-radius: 6px; font-size: .9rem; font-family: inherit;
  background: #fff; cursor: pointer; }
.mode-select:focus { outline: none; border-color: var(--primary); }
.badge-count { display: inline-flex; align-items: center; justify-content: center; min-width: 28px; height: 24px;
  background: var(--g100); color: var(--g700); border-radius: 12px; font-size: .8rem; font-weight: 600; padding: 0 8px; }
.mode-catalog { color: #b45309; }
.mode-shop { color: #059669; }
.mode-hidden { color: #dc2626; }
</style>
</head>
<body>

<main>
  <div class="sf-container">
    <h1 class="sf-title">🌐 ניהול חנות אונליין</h1>
    <p class="sf-subtitle">הגדרות, מותגים ומוצרים לחנות האונליין</p>

    <nav class="sf-nav">
      <a href="storefront-settings.html">⚙️ הגדרות</a>
      <a href="storefront-brands.html" class="active">🏷️ מותגים</a>
      <a href="storefront-products.html">📦 מוצרים</a>
      <a href="storefront-content.html">🤖 תוכן AI</a>
      <a href="storefront-blog.html">📝 בלוג</a>
      <a href="storefront-landing-content.html">🎯 דפי נחיתה</a>
    </nav>

    <div class="sf-section">
      <h2 style="font-size:1.1rem;font-weight:600;margin-bottom:16px">🏷️ מצב תצוגה לפי מותג</h2>
      <p style="color:var(--g400);font-size:.85rem;margin-bottom:16px">
        קטלוג = ללא מחיר, WhatsApp כ-CTA ראשי &nbsp;|&nbsp; חנות = עם מחיר &nbsp;|&nbsp; מוסתר = לא מופיע באתר
      </p>
      <div id="brands-table-container">
        <p style="color:var(--g400)">טוען מותגים...</p>
      </div>
    </div>
  </div>
</main>

<div id="toast-c"></div>
<div id="loading" class="loading-overlay" style="display:none">
  <div class="loading-box"><div class="spinner"></div><p id="loading-text">טוען...</p></div>
</div>
<div id="confirm-modal" class="modal-overlay" style="display:none">
  <div class="modal" style="max-width:400px;text-align:center">
    <h3 id="confirm-title">אישור</h3><p id="confirm-text"></p>
    <button class="btn btn-s" id="confirm-yes">כן</button>
    <button class="btn btn-g" id="confirm-no">לא — חזור</button>
  </div>
</div>

<script src="shared/js/theme-loader.js"></script>
<script src="shared/js/modal-builder.js"></script>
<script src="shared/js/modal-wizard.js"></script>
<script src="shared/js/toast.js"></script>
<script src="shared/js/pin-modal.js"></script>
<script src="shared/js/table-builder.js"></script>
<script src="shared/js/permission-ui.js"></script>
<script src="shared/js/supabase-client.js"></script>
<script src="shared/js/activity-logger.js"></script>
<script src="js/shared.js"></script>
<script src="js/shared-ui.js"></script>
<script src="js/auth-service.js"></script>
<script src="js/supabase-ops.js"></script>
<script src="js/header.js"></script>
<script src="js/alerts-badge.js"></script>
<script src="modules/storefront/storefront-brands.js"></script>
<script>
window.addEventListener('DOMContentLoaded', async () => {
  const session = await loadSession();
  if (!session) { window.location.href = '/'; return; }
  if (!hasPermission('settings.view')) { window.location.href = '/'; return; }
  await loadStorefrontBrands();
});
</script>
</body>
</html>
