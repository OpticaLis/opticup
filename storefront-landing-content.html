<!--
  Optic Up — Landing Page Content Manager
  View, edit, and AI-generate landing page content
-->
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Optic Up — ניהול דפי נחיתה</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared/css/variables.css">
<link rel="stylesheet" href="shared/css/components.css">
<link rel="stylesheet" href="shared/css/components-extra.css">
<link rel="stylesheet" href="shared/css/layout.css">
<link rel="stylesheet" href="shared/css/forms.css">
<link rel="stylesheet" href="shared/css/modal.css">
<link rel="stylesheet" href="shared/css/toast.css">
<link rel="stylesheet" href="shared/css/table.css">
<link rel="stylesheet" href="css/header.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
.sf-container { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }
.sf-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
.sf-subtitle { color: var(--g400); font-size: .9rem; margin-bottom: 24px; }
.sf-nav { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
.sf-nav a { padding: 8px 16px; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: .9rem;
  background: var(--g100); color: var(--g700); transition: all .2s; }
.sf-nav a.active, .sf-nav a:hover { background: var(--primary); color: #fff; }
.sf-section { background: #fff; border: 1px solid var(--g200); border-radius: 12px; padding: 24px; margin-bottom: 20px; }

.landing-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
.landing-card { border: 1px solid var(--g200); border-radius: 10px; padding: 16px; transition: all .2s; cursor: pointer; }
.landing-card:hover { border-color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,.06); }
.landing-card h3 { font-size: 1rem; font-weight: 600; margin-bottom: 6px; }
.landing-card .slug { font-size: .8rem; color: var(--g400); direction: ltr; margin-bottom: 8px; }
.landing-card .ai-status { font-size: .8rem; color: var(--g500); }
.btn-ai { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; padding: 8px 16px; border-radius: 8px;
  font-weight: 600; font-size: .85rem; cursor: pointer; border: none; }

/* Edit modal */
.landing-edit-modal { max-width: 700px; width: 95vw; max-height: 90vh; overflow-y: auto; }
.edit-field { margin-bottom: 16px; }
.edit-field label { display: block; font-size: .85rem; font-weight: 600; color: var(--g600); margin-bottom: 4px; }
.edit-field input, .edit-field textarea { width: 100%; padding: 10px 12px; border: 1px solid var(--g300); border-radius: 8px; font-size: .95rem; font-family: inherit; }
.edit-field textarea { min-height: 120px; resize: vertical; }
.edit-field .char-count { font-size: .75rem; color: var(--g400); text-align: left; margin-top: 2px; }
.edit-field .char-count.warn { color: #dc2626; }
.edit-actions { display: flex; gap: 12px; margin-top: 20px; }
</style>
</head>
<body>

<main>
  <div class="sf-container">
    <h1 class="sf-title">🎯 ניהול דפי נחיתה</h1>
    <p class="sf-subtitle">עריכת כותרות, תיאורים ו-CTA עבור דפי נחיתה — כולל ייצור AI</p>

    <nav class="sf-nav">
      <a href="storefront-settings.html">⚙️ הגדרות</a>
      <a href="storefront-brands.html">🏷️ מותגים</a>
      <a href="storefront-products.html">📦 מוצרים</a>
      <a href="storefront-content.html">🤖 תוכן AI</a>
      <a href="storefront-blog.html">📝 בלוג</a>
      <a href="storefront-landing-content.html" class="active">🎯 דפי נחיתה</a>
      <a href="storefront-studio.html">🎨 Studio</a>
    </nav>

    <div class="sf-section">
      <div id="landing-grid-container" class="landing-grid"></div>
    </div>
  </div>
</main>

<!-- Edit modal -->
<div id="landing-edit-modal" class="modal-overlay" style="display:none">
  <div class="modal landing-edit-modal">
    <h3 id="landing-edit-title">עריכת דף נחיתה</h3>

    <div class="edit-field">
      <label>כותרת ראשית</label>
      <input type="text" id="landing-headline">
    </div>
    <div class="edit-field">
      <label>כותרת משנה</label>
      <input type="text" id="landing-subheadline">
    </div>
    <div class="edit-field">
      <label>תיאור (HTML)</label>
      <textarea id="landing-description"></textarea>
    </div>
    <div class="edit-field">
      <label>טקסט CTA</label>
      <input type="text" id="landing-cta">
    </div>
    <div class="edit-field">
      <label>SEO Title</label>
      <input type="text" id="landing-seo-title" maxlength="80" oninput="landingCharCount('landing-seo-title', 60)">
      <div class="char-count" id="landing-seo-title-count">0/60</div>
    </div>
    <div class="edit-field">
      <label>SEO Description</label>
      <input type="text" id="landing-seo-desc" maxlength="200" oninput="landingCharCount('landing-seo-desc', 160)">
      <div class="char-count" id="landing-seo-desc-count">0/160</div>
    </div>

    <div class="edit-actions">
      <button class="btn-ai" onclick="regenerateLandingContent()">🤖 ייצר מחדש</button>
      <button class="btn-p" onclick="saveLandingEdit()">💾 שמור</button>
      <button class="btn-g" onclick="closeLandingEditModal()">ביטול</button>
    </div>
  </div>
</div>

<!-- Toast + Loading -->
<div id="toast-c"></div>
<div id="loading" class="loading-overlay" style="display:none">
  <div class="loading-box"><div class="spinner"></div><p id="loading-text">טוען...</p></div>
</div>

<!-- Shared JS -->
<script src="shared/js/theme-loader.js"></script>
<script src="shared/js/modal-builder.js"></script>
<script src="shared/js/modal-wizard.js"></script>
<script src="shared/js/toast.js"></script>
<script src="shared/js/pin-modal.js"></script>
<script src="shared/js/table-builder.js"></script>
<script src="shared/js/permission-ui.js"></script>
<script src="shared/js/supabase-client.js"></script>
<script src="shared/js/activity-logger.js"></script>
<script src="js/shared.js"></script>
<script src="js/shared-ui.js"></script>
<script src="js/auth-service.js"></script>
<script src="js/supabase-ops.js"></script>
<script src="js/header.js"></script>
<script src="js/alerts-badge.js"></script>
<script src="modules/storefront/storefront-landing-content.js"></script>
<script>
window.addEventListener('DOMContentLoaded', async () => {
  const session = await loadSession();
  if (!session) { window.location.href = '/'; return; }
  if (!hasPermission('settings.view')) { window.location.href = '/'; return; }
  await loadLandingPages();
});
</script>
</body>
</html>
