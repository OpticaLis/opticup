<!--
  Optic Up — Storefront Product Manager / ניהול מוצרים — חנות אונליין
  Bulk select + mode override
-->
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Optic Up — ניהול מוצרים לחנות</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared/css/variables.css">
<link rel="stylesheet" href="shared/css/components.css">
<link rel="stylesheet" href="shared/css/components-extra.css">
<link rel="stylesheet" href="shared/css/layout.css">
<link rel="stylesheet" href="shared/css/forms.css">
<link rel="stylesheet" href="shared/css/modal.css">
<link rel="stylesheet" href="shared/css/toast.css">
<link rel="stylesheet" href="shared/css/table.css">
<link rel="stylesheet" href="css/header.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
.sf-container { max-width: 1200px; margin: 0 auto; padding: 24px 16px; }
.sf-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
.sf-subtitle { color: var(--g400); font-size: .9rem; margin-bottom: 24px; }
.sf-nav { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
.sf-nav a { padding: 8px 16px; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: .9rem;
  background: var(--g100); color: var(--g700); transition: all .2s; }
.sf-nav a.active, .sf-nav a:hover { background: var(--primary); color: #fff; }
.sf-section { background: #fff; border: 1px solid var(--g200); border-radius: 12px; padding: 24px; margin-bottom: 20px; }
.filter-bar { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
.filter-bar select, .filter-bar input { padding: 8px 12px; border: 1px solid var(--g300); border-radius: 8px;
  font-size: .9rem; font-family: inherit; }
.filter-bar select:focus, .filter-bar input:focus { outline: none; border-color: var(--primary); }
.products-table { width: 100%; border-collapse: collapse; font-size: .9rem; }
.products-table th { text-align: right; padding: 10px 8px; font-weight: 600; font-size: .82rem; color: var(--g500);
  border-bottom: 2px solid var(--g200); white-space: nowrap; }
.products-table td { padding: 8px; border-bottom: 1px solid var(--g100); vertical-align: middle; }
.products-table tr:hover { background: var(--g50); }
.products-table input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
.mode-select { padding: 5px 8px; border: 1px solid var(--g300); border-radius: 6px; font-size: .85rem;
  font-family: inherit; background: #fff; cursor: pointer; }
.bulk-bar { display: none; background: var(--primary); color: #fff; padding: 12px 16px; border-radius: 10px;
  margin-bottom: 16px; align-items: center; gap: 12px; flex-wrap: wrap; }
.bulk-bar.visible { display: flex; }
.bulk-bar select { padding: 6px 10px; border-radius: 6px; border: none; font-family: inherit; font-size: .9rem; }
.bulk-bar button { padding: 6px 16px; border-radius: 6px; border: none; background: #fff; color: var(--primary);
  font-weight: 600; cursor: pointer; font-family: inherit; }
.bulk-bar button:hover { background: var(--g100); }
.resolved-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: .8rem; font-weight: 600; }
.resolved-catalog { background: #fef3c7; color: #b45309; }
.resolved-shop { background: #d1fae5; color: #059669; }
.resolved-hidden { background: #fee2e2; color: #dc2626; }
.count-label { font-size: .85rem; color: var(--g400); margin-bottom: 12px; }
</style>
</head>
<body>

<main>
  <div class="sf-container">
    <h1 class="sf-title">🌐 ניהול חנות אונליין</h1>
    <p class="sf-subtitle">הגדרות, מותגים ומוצרים לחנות האונליין</p>

    <nav class="sf-nav">
      <a href="storefront-settings.html">⚙️ הגדרות</a>
      <a href="storefront-brands.html">🏷️ מותגים</a>
      <a href="storefront-products.html" class="active">📦 מוצרים</a>
      <a href="storefront-content.html">🤖 תוכן AI</a>
      <a href="storefront-blog.html">📝 בלוג</a>
    </nav>

    <div class="sf-section">
      <h2 style="font-size:1.1rem;font-weight:600;margin-bottom:16px">📦 מוצרים — דריסת מצב תצוגה</h2>

      <!-- Filters -->
      <div class="filter-bar">
        <select id="filter-brand" onchange="filterProducts()">
          <option value="">כל המותגים</option>
        </select>
        <select id="filter-mode" onchange="filterProducts()">
          <option value="">כל המצבים</option>
          <option value="catalog">קטלוג</option>
          <option value="shop">חנות</option>
          <option value="hidden">מוסתר</option>
        </select>
        <input type="text" id="filter-search" placeholder="חפש דגם / ברקוד..." oninput="filterProducts()" style="min-width:200px">
      </div>

      <!-- Bulk action bar -->
      <div class="bulk-bar" id="bulk-bar">
        <span id="bulk-count">0 מוצרים נבחרו</span>
        <select id="bulk-mode">
          <option value="catalog">📋 קטלוג</option>
          <option value="shop">🛒 חנות</option>
          <option value="hidden">🚫 מוסתר</option>
          <option value="">🔄 נקה דריסה (עקוב אחרי מותג)</option>
        </select>
        <button onclick="applyBulkMode()">החל</button>
        <button onclick="clearSelection()">בטל בחירה</button>
      </div>

      <div id="products-count" class="count-label"></div>
      <div id="products-table-container">
        <p style="color:var(--g400)">טוען מוצרים...</p>
      </div>
    </div>
  </div>
</main>

<div id="toast-c"></div>
<div id="loading" class="loading-overlay" style="display:none">
  <div class="loading-box"><div class="spinner"></div><p id="loading-text">טוען...</p></div>
</div>
<div id="confirm-modal" class="modal-overlay" style="display:none">
  <div class="modal" style="max-width:400px;text-align:center">
    <h3 id="confirm-title">אישור</h3><p id="confirm-text"></p>
    <button class="btn btn-s" id="confirm-yes">כן</button>
    <button class="btn btn-g" id="confirm-no">לא — חזור</button>
  </div>
</div>

<script src="shared/js/theme-loader.js"></script>
<script src="shared/js/modal-builder.js"></script>
<script src="shared/js/modal-wizard.js"></script>
<script src="shared/js/toast.js"></script>
<script src="shared/js/pin-modal.js"></script>
<script src="shared/js/table-builder.js"></script>
<script src="shared/js/permission-ui.js"></script>
<script src="shared/js/supabase-client.js"></script>
<script src="shared/js/activity-logger.js"></script>
<script src="js/shared.js"></script>
<script src="js/shared-ui.js"></script>
<script src="js/auth-service.js"></script>
<script src="js/supabase-ops.js"></script>
<script src="js/header.js"></script>
<script src="js/alerts-badge.js"></script>
<script src="modules/storefront/storefront-products.js"></script>
<script>
window.addEventListener('DOMContentLoaded', async () => {
  const session = await loadSession();
  if (!session) { window.location.href = '/'; return; }
  if (!hasPermission('settings.view')) { window.location.href = '/'; return; }
  await loadStorefrontProducts();
});
</script>
</body>
</html>
