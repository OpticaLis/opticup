<!--
  Optic Up — Storefront Studio (CMS-2)
  Block editor for managing storefront pages
-->
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Optic Up — ניהול אתר Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared/css/variables.css">
<link rel="stylesheet" href="shared/css/components.css">
<link rel="stylesheet" href="shared/css/components-extra.css">
<link rel="stylesheet" href="shared/css/layout.css">
<link rel="stylesheet" href="shared/css/forms.css">
<link rel="stylesheet" href="shared/css/modal.css">
<link rel="stylesheet" href="shared/css/toast.css">
<link rel="stylesheet" href="shared/css/table.css">
<link rel="stylesheet" href="css/header.css">
<link rel="stylesheet" href="css/studio.css">
<link rel="stylesheet" href="css/studio-seo.css">
<link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
<style>
.sf-container { max-width: 1400px; margin: 0 auto; padding: 24px 16px; }
.sf-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
.sf-subtitle { color: var(--g400); font-size: .9rem; margin-bottom: 24px; }
.sf-nav { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
.sf-nav a { padding: 8px 16px; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: .9rem;
  background: var(--g100); color: var(--g700); transition: all .2s; }
.sf-nav a.active, .sf-nav a:hover { background: var(--primary); color: #fff; }
.studio-template-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
.studio-template-card { padding: 16px; border: 1px solid var(--g200); border-radius: 10px; cursor: pointer; transition: all .2s; }
.studio-template-card:hover { border-color: var(--primary); background: var(--g50); }
.studio-template-name { font-weight: 600; margin-bottom: 4px; }
.studio-template-desc { font-size: .85rem; color: var(--g500); margin-bottom: 8px; }
.studio-template-meta { font-size: .75rem; color: var(--g400); }
/* Quill richtext editor styling */
.studio-richtext-wrap { border: 1px solid var(--g200); border-radius: 8px; overflow: hidden; }
.studio-richtext-wrap .ql-toolbar { border: none; border-bottom: 1px solid var(--g200); background: var(--g50); direction: ltr; }
.studio-richtext-wrap .ql-container { border: none; font-family: 'Heebo', sans-serif; font-size: .95rem; min-height: 250px; }
.studio-richtext-wrap .ql-editor { min-height: 250px; direction: rtl; text-align: right; }
.studio-richtext-wrap .ql-editor p { margin-bottom: .5em; }
</style>
</head>
<body>

<main>
  <div class="sf-container">
    <h1 class="sf-title">🎨 ניהול אתר — Studio</h1>
    <p class="sf-subtitle">עריכת עמודים ובלוקים — ניהול תוכן ויזואלי</p>

    <nav class="sf-nav">
      <a href="storefront-settings.html">⚙️ הגדרות</a>
      <a href="storefront-brands.html">🏷️ מותגים</a>
      <a href="storefront-products.html">📦 מוצרים</a>
      <a href="storefront-content.html">🤖 תוכן AI</a>
      <a href="storefront-blog.html">📝 בלוג</a>
      <a href="storefront-landing-content.html">🎯 דפי נחיתה</a>
      <a href="storefront-glossary.html">📖 מילון מונחים</a>
      <a href="storefront-studio.html" class="active">🎨 Studio</a>
    </nav>

    <!-- Studio Tabs -->
    <div class="studio-tabs">
      <button class="studio-tab active" data-tab="pages" onclick="switchStudioTab('pages')">📄 עמודים</button>
      <button class="studio-tab" data-tab="components" id="tab-btn-components" onclick="switchStudioTab('components')">🔘 רכיבים</button>
      <button class="studio-tab" data-tab="leads" onclick="switchStudioTab('leads')">📋 לידים</button>
      <button class="studio-tab" data-tab="reviews" onclick="switchStudioTab('reviews')">⭐ ביקורות</button>
      <button class="studio-tab" data-tab="templates" id="tab-btn-templates" onclick="switchStudioTab('templates')">📑 תבניות</button>
      <a href="storefront-blog.html" class="studio-tab" style="text-decoration:none">📝 ניהול בלוג</a>
    </div>

    <!-- Tab: Pages (existing) -->
    <div class="studio-tab-content active" id="tab-pages">
      <div class="studio-layout">
        <aside class="studio-sidebar">
          <div class="studio-sidebar-header">
            <h3>עמודים</h3>
            <button class="btn btn-sm btn-primary" onclick="createPage()">+ חדש</button>
          </div>
          <div id="studio-page-list" class="studio-page-list">
            <div class="studio-empty">טוען...</div>
          </div>
        </aside>
        <section class="studio-main" id="studio-editor">
          <div class="studio-empty-editor">
            <p>בחר עמוד מהרשימה לעריכה</p>
          </div>
        </section>
        <!-- AI Prompt Bar container moved inside editor render -->
      </div>
    </div>

    <!-- Tab: Components -->
    <div class="studio-tab-content" id="tab-components">
      <div id="studio-components-content">
        <div class="studio-empty">טוען...</div>
      </div>
    </div>

    <!-- Tab: Leads -->
    <div class="studio-tab-content" id="tab-leads">
      <div id="studio-leads-content">
        <div class="studio-empty">טוען...</div>
      </div>
    </div>

    <!-- Tab: Reviews -->
    <div class="studio-tab-content" id="tab-reviews">
      <div id="studio-reviews-content">
        <div class="studio-empty">טוען...</div>
      </div>
    </div>

    <!-- Tab: Templates (super_admin only) -->
    <div class="studio-tab-content" id="tab-templates">
      <div id="studio-templates-content">
        <div class="studio-empty">טוען...</div>
      </div>
    </div>
  </div>
</main>

<!-- AI Diff Modal -->
<div id="modal-ai-diff" class="modal hidden">
  <div class="modal-content modal-large">
    <div id="ai-diff-content"></div>
  </div>
</div>

<!-- Toast + Loading -->
<div id="toast-c"></div>
<div id="loading" class="loading-overlay" style="display:none">
  <div class="loading-box"><div class="spinner"></div><p id="loading-text">טוען...</p></div>
</div>

<!-- Shared JS -->
<script src="shared/js/theme-loader.js"></script>
<script src="shared/js/modal-builder.js"></script>
<script src="shared/js/modal-wizard.js"></script>
<script src="shared/js/toast.js"></script>
<script src="shared/js/pin-modal.js"></script>
<script src="shared/js/table-builder.js"></script>
<script src="shared/js/permission-ui.js"></script>
<script src="shared/js/supabase-client.js"></script>
<script src="shared/js/activity-logger.js"></script>
<script src="js/shared.js"></script>
<script src="js/shared-ui.js"></script>
<script src="js/auth-service.js"></script>
<script src="js/supabase-ops.js"></script>
<script src="js/header.js"></script>
<script src="js/alerts-badge.js"></script>

<!-- Studio JS -->
<script src="modules/storefront/studio-permissions.js"></script>
<script src="modules/storefront/studio-block-schemas.js"></script>
<script src="modules/storefront/studio-form-renderer.js"></script>
<script src="modules/storefront/studio-richtext.js"></script>
<script src="modules/storefront/studio-product-picker.js"></script>
<script src="modules/storefront/studio-reviews.js"></script>
<script src="modules/storefront/studio-seo.js"></script>
<script src="modules/storefront/studio-pages.js"></script>
<script src="modules/storefront/studio-editor.js"></script>
<script src="modules/storefront/studio-components.js"></script>
<script src="modules/storefront/studio-leads.js"></script>
<script src="modules/storefront/studio-templates.js"></script>
<script src="modules/storefront/studio-ai-prompt.js"></script>
<script src="modules/storefront/studio-ai-diff.js"></script>

<script>
function switchStudioTab(tab) {
  document.querySelectorAll('.studio-tab[data-tab]').forEach(el => el.classList.toggle('active', el.dataset.tab === tab));
  document.querySelectorAll('.studio-tab-content').forEach(el => el.classList.toggle('active', el.id === 'tab-' + tab));
  if (tab === 'components' && !studioComponents.length) loadComponents();
  if (tab === 'leads' && !studioLeads.length) loadLeads();
  if (tab === 'reviews') loadReviews();
  if (tab === 'templates') renderTemplatesManager();
}

function applyStudioPermissions() {
  // Hide components tab for tenant_admin
  const compBtn = document.getElementById('tab-btn-components');
  if (compBtn) compBtn.style.display = canSee('components_tab') ? '' : 'none';

  // Hide templates tab for tenant_admin
  const tplBtn = document.getElementById('tab-btn-templates');
  if (tplBtn) tplBtn.style.display = canSee('templates_tab') ? '' : 'none';

  // Show/hide create page button
  const createBtn = document.querySelector('.studio-sidebar-header .btn');
  if (createBtn) createBtn.style.display = canSee('create_page_button') ? '' : 'none';
}

window.addEventListener('DOMContentLoaded', async () => {
  const session = await loadSession();
  if (!session) { window.location.href = '/'; return; }
  if (!hasPermission('settings.view')) { window.location.href = '/'; return; }
  applyStudioPermissions();
  await loadStudioPages();
});
</script>
</body>
</html>
